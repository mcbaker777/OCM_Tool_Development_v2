/* ===== SA Page ===== */
const STAKEHOLDER_TYPES=["Direct","Indirect","External"];
const DISPOSITIONS=["Supportive","Neutral","Resistant","Unknown"];
const FREQUENCY_OPTIONS=["Daily","Weekly","Bi-weekly","Monthly","As-needed"];
const CHANNEL_OPTIONS=["Town Hall","Chat/Spaces","Email Updates","1-on-1 with Manager","Team Meeting","Office Hours","Intranet/Portal","Report"];
const TONE_OPTIONS=["Data-driven","Vision-oriented","Process-focused","Mixed"];
const IMPACT_SCORES=[1,2,3,4,5];

function RatingDots({value,max=5,onChange,color="#c96a3a"}){
  return(
    <div style={{display:"flex",gap:3,alignItems:"center"}}>
      {IMPACT_SCORES.slice(0,max).map(n=>(
        <button key={n} onClick={()=>onChange(value===n?0:n)}
          style={{width:22,height:22,borderRadius:4,border:`1.5px solid ${n<=value?color:"var(--border)"}`,
            background:n<=value?color+"22":"transparent",cursor:"pointer",
            fontSize:10,fontWeight:900,fontFamily:"var(--mono)",color:n<=value?color:"var(--slate2)"}}>
          {n}
        </button>
      ))}
    </div>
  );
}

function SAPage({groups,rows,ciaEntries,showIndicators,setShowIndicators,adkarDot,dotColor,onAddGroup,onUpdateGroup,onRemoveGroup,onUpdateRow}){
  const {useState,useRef,useEffect}=React;
  const [activeId,setActiveId]=useState(null);
  const [newGrp,setNewGrp]=useState("");
  const [adding,setAdding]=useState(false);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiError,setAiError]=useState("");
  const inputRef=useRef(null);
  useEffect(()=>{if(adding&&inputRef.current)inputRef.current.focus();},[adding]);
  useEffect(()=>{if(activeId&&!groups.find(g=>g.id===activeId))setActiveId(null);},[groups]);
  useEffect(()=>{
    if(!adkarPopover) return;
    const handler=()=>setAdkarPopover(null);
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[adkarPopover]);
  useEffect(()=>{
    if(!numPopover) return;
    const handler=()=>setNumPopover(null);
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[numPopover]);

  // ── Filter state ──
  const [filterDept,setFilterDept]=useState("");
  const [filterType,setFilterType]=useState("");
  const [filterDisp,setFilterDisp]=useState("");
  const [filterImpact,setFilterImpact]=useState("");
  const [filterInfluence,setFilterInfluence]=useState("");
  const [filterAdkar,setFilterAdkar]=useState(""); // "full"|"partial"|"none"
  const [adkarPopover,setAdkarPopover]=useState(null); // {groupId, dim}
  const [numPopover,setNumPopover]=useState(null); // {groupId, field} for impact/influence

  const active=groups.find(g=>g.id===activeId);
  const activeRow=rows.find(r=>r.groupId===activeId)||{};
  const ciaFor=(id)=>ciaEntries.filter(e=>(e.impactedGroups||[]).includes(id));
  const assessed=rows.filter(r=>ADKAR_DIMS.every(d=>r[d])).length;
  const submit=()=>{const n=newGrp.trim();if(!n)return;onAddGroup(n);setNewGrp("");setAdding(false);};

  // Unique dept values for filter dropdown
  const deptOptions=[...new Set(groups.map(g=>g.department).filter(Boolean))].sort();
  const activeFilters=!!(filterDept||filterType||filterDisp||filterImpact||filterInfluence||filterAdkar);
  const filteredGroups=groups.filter(g=>{
    if(filterDept&&g.department!==filterDept) return false;
    if(filterType&&g.stakeholderType!==filterType) return false;
    if(filterDisp&&g.disposition!==filterDisp) return false;
    if(filterImpact&&Number(g.impactLevel||0)<Number(filterImpact)) return false;
    if(filterInfluence&&Number(g.influence||0)<Number(filterInfluence)) return false;
    if(filterAdkar){
      const row=rows.find(r=>r.groupId===g.id)||{};
      const filled=ADKAR_DIMS.filter(d=>row[d]).length;
      if(filterAdkar==="full"&&filled<5) return false;
      if(filterAdkar==="partial"&&(filled===0||filled===5)) return false;
      if(filterAdkar==="none"&&filled>0) return false;
    }
    return true;
  });

  const journeyLabel=(dot)=>({green:"Ready",amber:"Progressing",red:"Building",grey:"Not Started"}[dot]||"Not Started");
  const journeyColor=(dot)=>({green:"#3a7050",amber:"#c48a1a",red:"#b84040",grey:"#a89e92"}[dot]||"#a89e92");
  const dispColor=(d)=>({Supportive:"#4a9e6a",Neutral:"#c48a1a",Resistant:"#b84040",Unknown:"#a89e92"}[d]||"#a89e92");
  const LC={Low:"#b84040",Medium:"#c48a1a",High:"#4a9e6a"};
  const LB={Low:"#fdf0f0",Medium:"#fdf8ec",High:"#f0f7f2"};


  const runAiUpdate=async()=>{
    setAiLoading(true);setAiError("");
    const summary=groups.map(g=>{
      const row=rows.find(r=>r.groupId===g.id)||{};
      return `Group: ${g.name} | Type: ${g.stakeholderType||"?"} | Impact: ${g.impactLevel||"?"}/5 | Influence: ${g.influence||"?"}/5 | Disposition: ${g.disposition||"?"} | ADKAR: ${ADKAR_DIMS.map(d=>d[0].toUpperCase()+"="+(row[d]||"?")[0]).join(" ")} | Barriers: ${row.barriersToChange||"none noted"} | WIIFM: ${row.wiifm||"none noted"}`;
    }).join("\n");
    const ciaSum=ciaEntries.map(e=>`${e.id}: ${e.description} (${e.magnitude}, groups: ${(e.impactedGroups||[]).map(id=>groups.find(g=>g.id===id)?.name||id).join(",")})`).join("\n");
    const prompt=`You are an OCM expert. Based on the stakeholder assessment data below, provide analysis and recommendations.

STAKEHOLDER GROUPS:
${summary||"None defined yet"}

CHANGE IMPACT ENTRIES:
${ciaSum||"None logged yet"}

Please provide:
1. A brief (2-3 sentence) overall readiness summary
2. Top 3 risks by stakeholder group (group name + specific risk)
3. Top 3 recommended immediate actions
4. For each Resistant group: one specific WIIFM message suggestion

Keep responses concise and actionable. Format with clear sections.`;
    try{
      const res=await fetch("/api/claude",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:"You are an expert OCM strategist. Respond in plain text with clear section headers. Do not use JSON or markdown code blocks.",
          messages:[{role:"user",content:prompt}]
        })
      });
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error||`HTTP ${res.status}`);}
      const data=await res.json();
      const text=(data.content||[]).map(c=>c.text||"").join("").trim();
      setAiError(text||"No response received.");
    }catch(e){
      setAiError("Error: "+e.message);
    }
    setAiLoading(false);
  };

  return(
    <div className="pageView" style={{position:"relative"}}>
      {/* ── Page header ── */}
      <div className="pageHeader" style={{paddingBottom:14}}>
        <div style={{flexShrink:0}}>
          <div className="pageTitle">Stakeholder Assessment</div>
        </div>
        <div style={{flex:1,minWidth:0,padding:"0 24px"}}>
          <div style={{fontSize:13,color:"var(--slate)",lineHeight:1.65,maxWidth:560}}>
            Assess each group's readiness across ADKAR, capture resistance and engagement strategy, and track influence and disposition. Click any row to open the detail panel.
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"flex-start",flexShrink:0,flexWrap:"wrap"}}>
          <button className="btn btn-primary" style={{fontSize:13,padding:"8px 16px"}}
            onClick={()=>setAdding(true)}>+ Add Group</button>
        </div>
      </div>



      {/* ── Filter bar ── */}
      {groups.length>0&&(
        <div style={{padding:"7px 20px",borderBottom:"1px solid var(--border)",background:"var(--white)",
          display:"flex",alignItems:"center",gap:8,flexShrink:0,flexWrap:"wrap"}}>
          {/* Assessed indicator — leftmost */}
          <div style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:8,
            background:assessed===groups.length&&groups.length>0?"#f0f7f2":"var(--off2)",
            border:"1px solid "+(assessed===groups.length&&groups.length>0?"#a8d8b8":"var(--border)"),
            flexShrink:0}}>
            <span style={{width:7,height:7,borderRadius:"50%",flexShrink:0,display:"inline-block",
              background:assessed===groups.length&&groups.length>0?"#4a9e6a":"#c0b8b0"}}/>
            <span style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:900,
              color:assessed===groups.length&&groups.length>0?"#3a7050":"var(--slate)"}}>
              {assessed}/{groups.length}
            </span>
            <span style={{fontSize:11,color:"var(--slate2)"}}>fully assessed</span>
          </div>
          <div style={{width:1,height:16,background:"var(--border)",flexShrink:0}}/>
          <span style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:900,letterSpacing:".08em",color:"var(--slate2)"}}>FILTER</span>
          {[
            {val:filterDept,set:setFilterDept,opts:[{v:"",l:"All Depts"},...deptOptions.map(d=>({v:d,l:d}))]},
            {val:filterType,set:setFilterType,opts:[{v:"",l:"All Types"},...STAKEHOLDER_TYPES.map(t=>({v:t,l:t}))]},
            {val:filterDisp,set:setFilterDisp,opts:[{v:"",l:"All Dispositions"},...DISPOSITIONS.map(d=>({v:d,l:d}))]},
            {val:filterImpact,set:setFilterImpact,opts:[{v:"",l:"Any Impact"},{v:"3",l:"Impact ≥ 3"},{v:"4",l:"Impact ≥ 4"},{v:"5",l:"Impact = 5"}]},
            {val:filterInfluence,set:setFilterInfluence,opts:[{v:"",l:"Any Influence"},{v:"3",l:"Influence ≥ 3"},{v:"4",l:"Influence ≥ 4"},{v:"5",l:"Influence = 5"}]},
            {val:filterAdkar,set:setFilterAdkar,opts:[{v:"",l:"Any ADKAR"},{v:"full",l:"Fully Assessed"},{v:"partial",l:"Partially Assessed"},{v:"none",l:"Not Assessed"}]},
          ].map(({val,set,opts},fi)=>(
            <select key={fi} style={{fontSize:11,padding:"4px 7px",borderRadius:7,border:"1.5px solid",
              borderColor:val?"#c96a3a":"var(--border)",background:val?"#fdf3ec":"var(--white)",
              color:val?"#c96a3a":"var(--slate)",outline:"none",cursor:"pointer"}}
              value={val} onChange={e=>set(e.target.value)}>
              {opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          ))}
          {activeFilters&&(
            <button style={{fontSize:11,padding:"4px 10px",borderRadius:7,border:"1.5px solid #c96a3a",
              background:"#fdf3ec",color:"#c96a3a",cursor:"pointer",fontWeight:700}}
              onClick={()=>{setFilterDept("");setFilterType("");setFilterDisp("");setFilterImpact("");setFilterInfluence("");setFilterAdkar("");}}>
              ✕ Clear
            </button>
          )}
          {activeFilters&&(
            <span style={{fontSize:11,fontFamily:"var(--mono)",color:"var(--slate2)"}}>
              {filteredGroups.length}/{groups.length} shown
            </span>
          )}
        </div>
      )}

      <div style={{flex:1,overflow:"hidden",display:"flex"}}>
        {/* ── Main grid area ── */}
        <div style={{flex:1,overflowY:"auto",padding:activeId?"16px 16px":"16px 28px",display:"flex",flexDirection:"column",gap:16,transition:"padding .2s"}}>

          {/* Inline add input */}
          {adding&&(
            <div style={{display:"flex",gap:8,alignItems:"center",padding:"10px 14px",maxWidth:520,
              background:"var(--white)",borderRadius:10,border:"1.5px solid #c96a3a",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
              <input ref={inputRef} className="inp" style={{flex:1,fontSize:13,padding:"7px 10px"}}
                value={newGrp} onChange={e=>setNewGrp(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")submit();if(e.key==="Escape")setAdding(false);}}
                placeholder="Group name (e.g. Finance Team, Site Supervisors)…"/>
              <button className="btn btn-primary" style={{fontSize:12,padding:"6px 14px"}} onClick={submit}>Add</button>
              <button className="btn btn-secondary" style={{fontSize:12}} onClick={()=>{setAdding(false);setNewGrp("");}}>Cancel</button>
            </div>
          )}

          {/* Empty state */}
          {groups.length===0&&!adding&&(
            <div style={{textAlign:"center",padding:"50px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
              <div style={{width:60,height:60,borderRadius:"50%",background:"#f0f7f2",border:"2px solid #a8d8b8",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>👥</div>
              <div style={{fontFamily:"var(--serif)",fontSize:20,fontWeight:700,color:"var(--navy)"}}>No stakeholder groups yet</div>
              <div style={{fontSize:13,color:"var(--slate)",lineHeight:1.65,maxWidth:440}}>
                Define the groups most affected by this initiative. Add groups manually, or use <strong>✦ Generate Groups</strong> above to draft an initial set from project context.
              </div>
              <button className="btn btn-primary" style={{marginTop:4,fontSize:13,padding:"9px 22px"}}
                onClick={()=>setAdding(true)}>+ Add First Group</button>
            </div>
          )}


          {/* Heat map table */}
          {groups.length>0&&(
            <div style={{background:"var(--white)",border:"1px solid var(--border)",borderRadius:12,overflowX:"auto",width:"100%"}}>
              <table style={{borderCollapse:"collapse",tableLayout:"fixed",width:"100%"}}>
                <colgroup>
                  <col style={{width:"18%"}}/>
                  <col style={{width:"13%"}}/>
                  <col style={{width:"8%"}}/>
                  <col style={{width:"5%"}}/>
                  <col style={{width:"5%"}}/>
                  <col style={{width:"10%"}}/>
                  {ADKAR_DIMS.map(d=><col key={d} style={{width:"5%"}}/>)}
                  <col style={{width:"4%"}}/>
                  <col style={{width:"3%"}}/>
                </colgroup>
                <thead>
                  <tr style={{background:"var(--off)"}}>
                    <th style={{textAlign:"left",fontFamily:"var(--mono)",fontSize:10,fontWeight:900,
                      letterSpacing:".08em",color:"var(--slate2)",padding:"10px 14px"}}>GROUP</th>
                    <th style={{textAlign:"left",fontFamily:"var(--mono)",fontSize:10,fontWeight:900,
                      letterSpacing:".06em",color:"var(--slate2)",padding:"10px 10px"}}>DEPT / AREA</th>
                    <th style={{textAlign:"left",fontFamily:"var(--mono)",fontSize:10,fontWeight:900,
                      letterSpacing:".06em",color:"var(--slate2)",padding:"10px 6px"}}>TYPE</th>
                    <th style={{textAlign:"center",fontFamily:"var(--mono)",fontSize:10,fontWeight:900,
                      letterSpacing:".06em",color:"var(--slate2)",padding:"10px 4px"}}>IMPACT</th>
                    <th style={{textAlign:"center",fontFamily:"var(--mono)",fontSize:10,fontWeight:900,
                      letterSpacing:".06em",color:"var(--slate2)",padding:"10px 4px"}}>INFL.</th>
                    <th style={{textAlign:"center",fontFamily:"var(--mono)",fontSize:10,fontWeight:900,
                      letterSpacing:".06em",color:"var(--slate2)",padding:"10px 6px"}}>DISPOSITION</th>
                    {ADKAR_DIMS.map(d=>(
                      <th key={d} style={{textAlign:"center",fontFamily:"var(--mono)",fontSize:10,fontWeight:900,
                        letterSpacing:".04em",color:"var(--slate2)",padding:"10px 3px"}}>
                        {d[0].toUpperCase()}
                      </th>
                    ))}

                    <th style={{textAlign:"center",fontFamily:"var(--mono)",fontSize:10,fontWeight:900,
                      letterSpacing:".04em",color:"var(--slate2)",padding:"10px 3px"}}>RAG</th>
                    <th/>
                  </tr>
                </thead>
                <tbody>
                  {filteredGroups.map((g,gi)=>{
                    const row=rows.find(r=>r.groupId===g.id)||{};
                    const dot=adkarDot(row);
                    const hits=ciaFor(g.id);
                    const isActive=g.id===activeId;
                    const imp=Number(g.impactLevel)||0;
                    const inf=Number(g.influence)||0;
                    const dc=dispColor(g.disposition);
                    return(
                      <tr key={g.id} onClick={()=>setActiveId(isActive?null:g.id)}
                        style={{cursor:"pointer",
                          background:isActive?"#fdf3ec":gi%2===0?"var(--white)":"#faf8f4",
                          borderTop:"1px solid var(--border)",
                          boxShadow:isActive?"inset 3px 0 0 #c96a3a":"none",
                          transition:"background .1s,box-shadow .1s"}}>
                        {/* Group name */}
                        <td style={{padding:"14px 14px",verticalAlign:"middle",overflow:"hidden"}}>
                          <div style={{display:"flex",alignItems:"center",gap:7}}>
                            <span style={{width:8,height:8,borderRadius:"50%",background:dotColor[dot],flexShrink:0,display:"inline-block"}}/>
                            <div style={{minWidth:0}}>
                              <div style={{fontSize:13,fontWeight:700,color:"var(--navy)",overflow:"hidden",textOverflow:"ellipsis"}}>{g.name}</div>
                              {hits.length>0&&<div style={{fontSize:10,fontFamily:"var(--mono)",color:"var(--slate2)",marginTop:1}}>{hits.length} CIA{hits.some(c=>c.magnitude==="High")&&<span style={{color:"#b84040",marginLeft:3}}>●</span>}</div>}
                            </div>
                          </div>
                        </td>
                        {/* Dept — own cell */}
                        <td style={{padding:"14px 10px",verticalAlign:"middle"}} onClick={e=>e.stopPropagation()}>
                          <input className="inp" style={{fontSize:11,padding:"4px 7px",width:"100%",minWidth:0,boxSizing:"border-box"}}
                            value={g.department||""} onChange={e=>onUpdateGroup(g.id,{department:e.target.value})}
                            placeholder="Department"/>
                        </td>
                        {/* Type — own cell */}
                        <td style={{padding:"14px 6px",verticalAlign:"middle"}} onClick={e=>e.stopPropagation()}>
                          <select className="inp" style={{fontSize:11,padding:"4px 5px",width:"100%",minWidth:0,boxSizing:"border-box"}}
                            value={g.stakeholderType||""} onChange={e=>onUpdateGroup(g.id,{stakeholderType:e.target.value})}>
                            <option value="">—</option>
                            {STAKEHOLDER_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                          </select>
                        </td>
                        {/* Impact 1-5 — popover circle */}
                        {(()=>{
                          const isImpOpen=numPopover&&numPopover.groupId===g.id&&numPopover.field==="impactLevel";
                          return(
                            <td style={{textAlign:"center",padding:"10px 4px",verticalAlign:"middle",position:"relative"}} onClick={e=>e.stopPropagation()}>
                              <button
                                onClick={e=>{e.stopPropagation();setNumPopover(isImpOpen?null:{groupId:g.id,field:"impactLevel"});}}
                                style={{width:28,height:28,borderRadius:"50%",border:"none",cursor:"pointer",
                                  display:"inline-flex",alignItems:"center",justifyContent:"center",padding:0,

/* ===== ProjectWorkspace — lifts shared state, owns navigation ===== */
function ProjectWorkspace({project,tier,initLanes,initPhases,initialTasks,aiGenerated,initRag,initDeliverables,initGoLiveDate,initLaneColors,initLaneVisible,initCollapsedLanes,portfolioId,onExitToHome,viewOnly,initCiaEntries,initStakeholderGroups,initStakeholderRows}){
  const {useState,useRef,useMemo,useEffect}=React;

  // ── Navigation ──
  const [currentView,setCurrentView]=useState("map"); // "map" | "cia" | "sa"

  // ── Live lanes/phases — kept in sync with Stage4 via callbacks ──
  const [liveLanes,setLiveLanes]=useState(()=>initLanes||[]);
  const [livePhases,setLivePhases]=useState(()=>initPhases||[]);

  // ── CIA state ──
  const [ciaEntries,setCiaEntries]=useState(()=>initCiaEntries||[]);
  const ciaIdRef=useRef((initCiaEntries||[]).length+1);
  const addCiaEntry=()=>{
    const id=`CHG-${String(ciaIdRef.current).padStart(3,"0")}`;
    ciaIdRef.current++;
    setCiaEntries(prev=>[...prev,{id,title:"",description:"",currentState:"",futureState:"",impactTypes:[],impactedGroups:[],magnitude:"",workstream:"",timing:"",implications:"",notes:"",docTitle:"",docLink:""}]);
  };
  const addCiaEntryWithData=(data)=>{
    const id=`CHG-${String(ciaIdRef.current).padStart(3,"0")}`;
    ciaIdRef.current++;
    setCiaEntries(prev=>[...prev,{id,title:data.title||"",description:data.description||"",
      currentState:data.currentState||"",futureState:data.futureState||"",
      impactTypes:data.impactTypes||[],impactedGroups:[],magnitude:data.magnitude||"",
      workstream:data.workstream||"",timing:"",implications:data.implications||"",
      notes:"AI-generated draft",docTitle:"",docLink:""}]);
  };
  const updateCia=(id,patch)=>setCiaEntries(prev=>prev.map(e=>e.id===id?{...e,...patch}:e));
  const removeCia=(id)=>setCiaEntries(prev=>prev.filter(e=>e.id!==id));

  // ── SA state ──
  const [stakeholderGroups,setStakeholderGroups]=useState(()=>initStakeholderGroups||[]);
  const [stakeholderRows,setStakeholderRows]=useState(()=>initStakeholderRows||[]);
  const [showIndicators,setShowIndicators]=useState(true);
  const grpIdRef=useRef((initStakeholderGroups||[]).length+1);
  const addGroup=(name="")=>{
    const id=`GRP-${String(grpIdRef.current).padStart(3,"0")}`;
    grpIdRef.current++;
    setStakeholderGroups(prev=>[...prev,{
      id,name,department:"",headcount:"",keyContact:"",docTitle:"",docLink:"",
      stakeholderType:"",  // Direct / Indirect / External
      impactLevel:"",      // 1-5
      influence:"",        // 1-5
      disposition:"",      // Supportive / Neutral / Resistant / Unknown
    }]);
    setStakeholderRows(prev=>[...prev,{
      groupId:id,
      awareness:"",desire:"",knowledge:"",ability:"",reinforcement:"",
      resistanceNotes:"",interventionPlan:"",engagementStrategy:"",
      barriersToChange:"",wiifm:"",whatsChanging:"",
      preferredChannels:[],frequency:"",languageTone:"",
    }]);
    return id;
  };
  const updateGroup=(id,patch)=>setStakeholderGroups(prev=>prev.map(g=>g.id===id?{...g,...patch}:g));
  const removeGroup=(id)=>{
    setStakeholderGroups(prev=>prev.filter(g=>g.id!==id));
    setStakeholderRows(prev=>prev.filter(r=>r.groupId!==id));
    setCiaEntries(prev=>prev.map(e=>({...e,impactedGroups:(e.impactedGroups||[]).filter(x=>x!==id)})));
  };
  const updateSaRow=(groupId,patch)=>setStakeholderRows(prev=>prev.map(r=>r.groupId===groupId?{...r,...patch}:r));
  const ADKAR_D=["awareness","desire","knowledge","ability","reinforcement"];
  const adkarDot=(row)=>{
    if(!row) return "grey";
    const vals=ADKAR_D.map(d=>row[d]);
    if(vals.every(v=>!v)) return "grey";
    if(vals.some(v=>v==="Low")) return "red";
    if(vals.some(v=>v==="Medium")) return "amber";
    if(vals.every(v=>v==="High"||!v)&&vals.some(v=>v==="High")) return "green";
    return "grey";
  };
  const DOT_COLOR={green:"#4a9e6a",amber:"#c48a1a",red:"#b84040",grey:"#c0b8b0"};

  const [mapControls,setMapControls]=useState(null); // receives {RagControl,FilterToggle,SettingsControl,goLiveDate,rag} from Stage4
  const [showExecPreflight,setShowExecPreflight]=useState(false);
  const [exportingExec,setExportingExec]=useState(false);

  // ── Executive Summary Export ──────────────────────────────────────────────
  const exportExecutiveSummary=async()=>{
    setExportingExec(true);
    try{
      // Derive live state from stage4Snap (falls back to init props)
      const snap=stage4Snap||{};
      const tasks=snap.tasks||initialTasks||[];
      const lanes=snap.lanes||liveLanes||[];
      const phases=snap.phases||livePhases||[];
      const rag=snap.rag||initRag||"none";
      const goLiveDate=snap.goLiveDate||initGoLiveDate||"";

      const ragLabel={none:"Not Set",green:"On Track",amber:"At Risk",red:"Critical"}[rag]||rag;
      const ragColor={none:"#888",green:"#2d7a45",amber:"#b88a10",red:"#b84040"}[rag]||"#888";

      // Readiness Map: task/RAG counts per lane × phase
      const laneStats=lanes.map(ln=>{
        const lnTasks=tasks.filter(t=>t.laneId===ln.id);
        const phaseBreakdown=phases.map(ph=>{
          const phTasks=lnTasks.filter(t=>t.phaseId===ph.id);
          const rc={red:0,amber:0,green:0,none:0};
          phTasks.forEach(t=>{rc[t.rag||"none"]=(rc[t.rag||"none"]||0)+1;});
          return{phase:ph.label,total:phTasks.length,...rc};
        }).filter(p=>p.total>0);
        return{lane:ln.label,total:lnTasks.length,phases:phaseBreakdown};
      });

      // CIA bucketed by magnitude
      const ciaMag={High:[],Medium:[],Low:[],Other:[]};
      ciaEntries.forEach(e=>{
        const m=e.magnitude;
        if(m==="High") ciaMag.High.push(e);
        else if(m==="Medium") ciaMag.Medium.push(e);
        else if(m==="Low") ciaMag.Low.push(e);
        else ciaMag.Other.push(e);
      });

      // ADKAR summary per group (High/Medium/Low → 3/2/1 for averaging)
      const ADKAR_KEYS=["awareness","desire","knowledge","ability","reinforcement"];
      const ADKAR_LABELS=["Awareness","Desire","Knowledge","Ability","Reinforcement"];
      const adkarNum=v=>v==="High"?3:v==="Medium"?2:v==="Low"?1:null;
      const adkarLabel=n=>n>=2.5?"High":n>=1.5?"Medium":n!==null?"Low":"—";
      const stakeholderSummary=stakeholderGroups.map(grp=>{
        const row=stakeholderRows.find(r=>r.groupId===grp.id);
        if(!row) return{group:grp.name,n:0,adkar:null,disposition:grp.disposition,impactLevel:grp.impactLevel};
        const adkar=ADKAR_KEYS.reduce((acc,k)=>{
          const n=adkarNum(row[k]);
          acc[k]={raw:row[k]||"—",num:n};
          return acc;
        },{});
        const scored=ADKAR_KEYS.map(k=>adkar[k].num).filter(v=>v!==null);
        const avg=scored.length?scored.reduce((a,b)=>a+b,0)/scored.length:null;
        return{group:grp.name,n:1,adkar,avg,disposition:grp.disposition,impactLevel:grp.impactLevel};
      });

      // ── AI Narrative ──
      const promptLines=[
        `You are an Organizational Change Management expert writing an executive summary for a senior leadership audience.`,
        ``,
        `PROJECT: ${project?.name||"Unnamed Project"}`,
        `OWNER: ${project?.owner||"—"}`,
        `GO-LIVE: ${goLiveDate||"TBD"}`,
        `OVERALL RAG STATUS: ${ragLabel}`,
        `TIER: ${tier}`,
        ``,
        `READINESS MAP SUMMARY (${tasks.length} total tasks across ${lanes.length} workstreams, ${phases.length} phases):`,
        ...laneStats.map(l=>
          `  ${l.lane} (${l.total} tasks): `+
          l.phases.map(p=>`${p.phase}[G:${p.green} A:${p.amber} R:${p.red}]`).join(", ")
        ),
        ``,
        `CHANGE IMPACT ASSESSMENT (${ciaEntries.length} changes logged):`,
        `  High magnitude: ${ciaMag.High.length} — ${ciaMag.High.slice(0,3).map(e=>e.title||"untitled").join("; ")}`,
        `  Medium magnitude: ${ciaMag.Medium.length}`,
        `  Low magnitude: ${ciaMag.Low.length}`,
        ciaEntries.length>0?`  Key themes: ${[...new Set(ciaEntries.flatMap(e=>e.impactTypes||[]))].slice(0,6).join(", ")}`:"",
        ``,
        `STAKEHOLDER ASSESSMENT (${stakeholderGroups.length} groups):`,
        ...stakeholderSummary.map(s=>
          s.adkar
            ? `  ${s.group}: A=${s.adkar.awareness.raw} D=${s.adkar.desire.raw} K=${s.adkar.knowledge.raw} Ab=${s.adkar.ability.raw} R=${s.adkar.reinforcement.raw} | Disposition: ${s.disposition||"—"} | Impact Level: ${s.impactLevel||"—"}`
            : `  ${s.group}: no ADKAR data`
        ),
        ``,
        `Write a focused executive summary in 4–5 paragraphs:`,
        `1. Overall change readiness posture and RAG interpretation`,
        `2. Workstream progress — call out any critical blockers or concentrations of red/amber`,
        `3. Top change impacts and what they signal for adoption risk`,
        `4. ADKAR read: where is change readiness weakest, and what that means for the go-live window`,
        `5. Close with exactly 3 recommended actions for leadership (written as prose, not a list)`,
        ``,
        `Tone: authoritative, concise, no filler. Paragraph form only — no bullets, no headers.`,
      ];

      let narrative="AI narrative unavailable — displaying structured data only.";
      try{
        const res=await fetch("/api/claude",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            model:"claude-sonnet-4-20250514",
            max_tokens:1000,
            messages:[{role:"user",content:promptLines.join("\n")}]
          })
        });
        const data=await res.json();
        if(data?.content?.[0]?.text) narrative=data.content[0].text;
      }catch(err){
        console.warn("Exec summary AI call failed:",err);
      }

      // ── Build printable HTML ──
      const adkarDotColor=v=>v==="High"?"#2d7a45":v==="Medium"?"#b88a10":v==="Low"?"#b84040":"#c0b8b0";
      const adkarBg=v=>v==="High"?"#dff3e8":v==="Medium"?"#fef3d0":v==="Low"?"#fde8e8":"#f0ebe2";
      const magTag=m=>{
        if(m==="High") return`<span style="display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;font-family:'Geist Mono',monospace;background:#fde8e8;color:#b84040;letter-spacing:.04em">HIGH</span>`;
        if(m==="Medium") return`<span style="display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;font-family:'Geist Mono',monospace;background:#fef3d0;color:#a07010;letter-spacing:.04em">MED</span>`;
        if(m==="Low") return`<span style="display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;font-family:'Geist Mono',monospace;background:#dff3e8;color:#2d7a45;letter-spacing:.04em">LOW</span>`;
        return`<span style="display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;font-family:'Geist Mono',monospace;background:#f0ebe2;color:#7a6e62;letter-spacing:.04em">${m||"—"}</span>`;
      };

      const html=`<!DOCTYPE html>

<style>

<div class="cover">

<div class="body-wrap">

  <h2 class="page-break">Readiness Map — Workstream Summary</h2>
  <div class="section-card">
    <table>

        ${laneStats.length===0
          ?`<tr><td colspan="7" style="color:#aaa;font-style:italic;text-align:center;padding:20px">No readiness map data.</td></tr>`
          :laneStats.map(l=>{
            const visPhases=l.phases;

      ?`<p style="color:#aaa;font-style:italic;padding:20px;text-align:center">No CIA entries recorded.</p>`
      :`<table>

        <tbody>
          ${ciaEntries.map(e=>`

              <td style="font-weight:500;max-width:240px">${(e.title||e.description||"—").replace(/</g,"&lt;")}</td>
              <td style="font-family:'Geist Mono',monospace;font-size:11px;color:#7a6e62">${(e.workstream||"—").replace(/</g,"&lt;")}</td>
              <td style="font-size:12px">${(e.impactTypes||[]).join(", ")||"—"}</td>
              <td style="font-family:'Geist Mono',monospace;font-size:11px">${(e.timing||"—").replace(/</g,"&lt;")}</td>

  <h2>Stakeholder Assessment — ADKAR <span style="font-family:'Geist Mono',monospace;font-size:13px;font-weight:400;color:#7a6e62">(${stakeholderGroups.length} groups)</span></h2>
  ${stakeholderSummary.length===0
    ?`<div class="section-card"><p style="color:#aaa;font-style:italic;padding:20px;text-align:center">No stakeholder groups recorded.</p></div>`
    :stakeholderSummary.map(s=>`
      <div class="adkar-card">
        <div class="adkar-header">
          <div>
            <div class="adkar-name">${s.group.replace(/</g,"&lt;")}</div>
            ${s.disposition||s.impactLevel?`<div style="margin-top:4px;display:flex;gap:8px">
              ${s.disposition?`<span style="font-family:'Geist Mono',monospace;font-size:10px;color:#7a6e62;letter-spacing:.04em">${s.disposition.replace(/</g,"&lt;")}</span>`:""}
              ${s.impactLevel?`<span style="font-family:'Geist Mono',monospace;font-size:10px;color:#7a6e62">Impact: ${s.impactLevel}</span>`:""}
            </div>`:""}
          </div>
          <div class="adkar-meta">ADKAR ASSESSMENT</div>
        </div>
        ${s.adkar
          ?`<div class="adkar-grid">
              ${ADKAR_KEYS.map((k,i)=>{
                const v=s.adkar[k].raw;

                return`<div class="adkar-cell">

          :`<p style="color:#aaa;font-style:italic;font-size:12px">No ADKAR data recorded.</p>`
        }
      </div>`).join("")
  }

  <div class="generated-at">

    &nbsp;·&nbsp; ${project?.name||""}

      const win=window.open("","_blank");
      if(win){ win.document.write(html); win.document.close(); }
      else{ alert("Pop-up blocked — please allow pop-ups for this page to open the export."); }
    }finally{
      setExportingExec(false);
    }
  };

  // ── Auto-save to portfolio localStorage ──
  // Runs whenever tasks/CIA/SA/deliverables/RAG/goLiveDate change in Stage4.
  // Stage4 state is owned there, so we use a callback approach: Stage4 calls
  // onSaveSnap whenever its internal state mutates.
  const [stage4Snap,setStage4Snap]=useState(null);
  useEffect(()=>{
    if(!portfolioId||!stage4Snap) return;
    const snap={
      _v:7, id:portfolioId, project, tier,
      lanes: stage4Snap.lanes,
      phases: stage4Snap.phases,
      tasks: stage4Snap.tasks,
      goLiveDate: stage4Snap.goLiveDate,
      laneColors: stage4Snap.laneColors,
      laneVisible: stage4Snap.laneVisible,
      collapsedLanes: stage4Snap.collapsedLanes,
      rag: stage4Snap.rag,
      deliverables: stage4Snap.deliverables,
      ciaEntries,
      stakeholderGroups,
      stakeholderRows,
      savedAt: new Date().toISOString(),
    };
    portfolioUpsert(snap);
  },[stage4Snap, ciaEntries, stakeholderGroups, stakeholderRows]);

  const ciaAssessedCount=ciaEntries.length;
  const saAssessedCount=stakeholderRows.filter(r=>ADKAR_D.every(d=>r[d])).length;
  const saGroupCount=stakeholderGroups.length;

  // ── Pulse — rule-based observation engine ──
  const [pulseOpen,setPulseOpen]=useState(false);
  const [pulseTab,setPulseTab]=useState("monitor"); // "monitor" | "update"
  const [pulseRec,setPulseRec]=useState({}); // {obsId: {loading, result, error}}
  const pulseRef=useRef(null);

  useEffect(()=>{
    if(!pulseOpen) return;
    const handler=(e)=>{ if(pulseRef.current&&!pulseRef.current.contains(e.target)) setPulseOpen(false); };
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[pulseOpen]);

  const pulseObservations=useMemo(()=>{
    const obs=[];
    const snap=stage4Snap||{};
    const tasks=snap.tasks||{};
    const goLiveDate=snap.goLiveDate||initGoLiveDate||"";
    const rag=snap.rag||initRag||"none";
    const deliverables=snap.deliverables||[];

    // Helper: flatten all tasks to array
    const allTasks=[];
    Object.entries(tasks).forEach(([lane,phases])=>{
      Object.entries(phases||{}).forEach(([phase,arr])=>{
        (arr||[]).forEach(t=>allTasks.push({...t,lane,phase}));
      });
    });

    // Days to go-live
    const daysLeft=goLiveDate?Math.ceil((new Date(goLiveDate)-new Date())/(1000*60*60*24)):null;

    // ── Cross-module rules ──

    // CIA entries with High magnitude but no stakeholder groups linked
    const unlinkedHighCia=ciaEntries.filter(e=>e.magnitude==="High"&&(!e.impactedGroups||e.impactedGroups.length===0));
    if(unlinkedHighCia.length>0){
      obs.push({
        id:"cia_unlinked_high",
        severity:"red",
        title:`${unlinkedHighCia.length} High-magnitude change${unlinkedHighCia.length>1?"s":""} have no stakeholder groups linked`,
        why:"High-magnitude changes without linked groups may not be reflected in your engagement or readiness planning.",
        module:"cia",
        data:{entries:unlinkedHighCia},
      });
    }

    // SA groups with High-magnitude CIA impacts but Low ADKAR ratings
    stakeholderGroups.forEach(g=>{
      const row=stakeholderRows.find(r=>r.groupId===g.id)||{};
      const highImpacts=ciaEntries.filter(e=>e.magnitude==="High"&&(e.impactedGroups||[]).includes(g.id));
      const lowAdkar=ADKAR_D.filter(d=>row[d]==="Low");
      if(highImpacts.length>0&&lowAdkar.length>0){
        obs.push({
          id:`sa_readiness_gap_${g.id}`,
          severity:"red",
          title:`Readiness gap: ${g.name} has High-magnitude impacts but Low ${lowAdkar.map(d=>d[0].toUpperCase()).join(", ")} rating${lowAdkar.length>1?"s":""}`,
          why:"A group facing high-magnitude change with low readiness scores represents significant adoption risk.",
          module:"sa",
          data:{groupId:g.id,groupName:g.name,lowAdkar,highImpacts},
        });
      }
    });

    // Resistant groups with no resistance notes or intervention plan
    stakeholderGroups.forEach(g=>{
      const row=stakeholderRows.find(r=>r.groupId===g.id)||{};
      if(g.disposition==="Resistant"&&!row.resistanceNotes&&!row.interventionPlan){
        obs.push({
          id:`sa_resistant_no_plan_${g.id}`,
          severity:"red",
          title:`${g.name} is Resistant with no resistance notes or intervention plan`,
          why:"Resistant groups without a documented response plan are an unmanaged risk.",
          module:"sa",
          data:{groupId:g.id,groupName:g.name},
        });
      }
    });

    // SA groups with no CIA impacts linked at all
    const groupsWithNoImpacts=stakeholderGroups.filter(g=>!ciaEntries.some(e=>(e.impactedGroups||[]).includes(g.id)));
    if(groupsWithNoImpacts.length>0&&ciaEntries.length>0){
      obs.push({
        id:"sa_groups_no_impacts",
        severity:"amber",
        title:`${groupsWithNoImpacts.length} stakeholder group${groupsWithNoImpacts.length>1?"s":""} have no change impacts linked`,
        why:"Groups without linked CIA entries may be missing from your impact and engagement planning.",
        module:"sa",
        data:{groups:groupsWithNoImpacts.map(g=>g.name)},

    }

/* ===== Full chain panel ===== */
function FullChainPanel({lanes, phases, tasks, selectedId, onJump}){
  const {byId}=useMemo(()=>buildDependencyGraph(lanes, phases, tasks),[lanes, phases, tasks]);
  const sel=byId.get(selectedId);

  if(!sel){
    return <div style={{fontSize:13,color:"var(--slate2)"}}>Selected task not found.</div>;
  }

  const upstreamSet=walkUpstream(byId, selectedId);
  const downstreamSet=walkDownstream(byId, selectedId);
  const upstreamDepth=topoDepths(byId, upstreamSet);
  const downstreamDepth=topoDepths(byId, downstreamSet);

  const upstream=[...upstreamSet].map(id=>byId.get(id)).filter(Boolean)
    .sort((a,b)=>(upstreamDepth.get(a.id)||0)-(upstreamDepth.get(b.id)||0));
  const downstream=[...downstreamSet].map(id=>byId.get(id)).filter(Boolean)
    .sort((a,b)=>(downstreamDepth.get(a.id)||0)-(downstreamDepth.get(b.id)||0));

  const Card=({node})=>{
    const m=STATUS_META[node.status]||STATUS_META.blue;
    return(
      <div className="card" onClick={()=>onJump(node.id)}
        style={{cursor:"pointer",padding:"9px 11px",borderLeft:`3px solid ${m.dot}`,background:"var(--white)",marginBottom:6,borderRadius:14}}>
        <div style={{fontFamily:"var(--serif)",fontSize:13,fontWeight:500,lineHeight:1.45,marginBottom:4,color:"var(--navy)",letterSpacing:"-.01em"}}>
          {node.label}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <span className="pill" style={{borderColor:`${m.dot}55`,color:m.color}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:m.dot,display:"inline-block"}}></span>
            {m.label.toUpperCase()}
          </span>
          <span style={{fontSize:12,fontFamily:"var(--mono)",color:"var(--slate2)"}}>
            {node.phase} · {node.lane}
          </span>
          {node._depFlag && <span style={{fontSize:12,fontWeight:900,color:"var(--orange)"}}>⚠ at risk</span>}
        </div>
      </div>
    );
  };

  return(
    <div>
      <div style={{marginBottom:10}}>
        <div style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:900,letterSpacing:".08em",color:"var(--slate2)"}}>
          UPSTREAM
        </div>
        {upstream.length===0 ? (
          <div style={{fontSize:13,color:"var(--slate2)",marginTop:6}}>None</div>
        ) : (
          <div style={{marginTop:8}}>
            {upstream.map(n=><Card key={n.id} node={n} />)}
          </div>
        )}
      </div>

      <div style={{margin:"12px 0",height:1,background:"var(--border)"}} />

      <div style={{marginBottom:10}}>
        <div style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:900,letterSpacing:".08em",color:"var(--slate2)"}}>
          SELECTED
        </div>
        <div style={{marginTop:8}}>
          <Card node={sel} />
        </div>
      </div>

      <div style={{margin:"12px 0",height:1,background:"var(--border)"}} />

      <div style={{marginBottom:10}}>
        <div style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:900,letterSpacing:".08em",color:"var(--slate2)"}}>
          DOWNSTREAM
        </div>
        {downstream.length===0 ? (
          <div style={{fontSize:13,color:"var(--slate2)",marginTop:6}}>None</div>
        ) : (
          <div style={{marginTop:8}}>
            {downstream.map(n=><Card key={n.id} node={n} />)}
          </div>
        )}
      </div>
    </div>
  );
}

/* ===== Portfolio Storage ===== */
const LS_PORTFOLIO="rmb_portfolio_v1";

function portfolioLoad(){
  try{ return JSON.parse(localStorage.getItem(LS_PORTFOLIO)||"{}"); }catch(_){ return {}; }
}
function portfolioSave(all){
  try{ localStorage.setItem(LS_PORTFOLIO, JSON.stringify(all)); }catch(_){}
}
function portfolioUpsert(snap){
  if(!snap||!snap.id) return;
  const all=portfolioLoad();
  all[snap.id]=snap;
  portfolioSave(all);
}
function portfolioDelete(id){
  const all=portfolioLoad();
  delete all[id];
  portfolioSave(all);
}
function portfolioList(){
  const all=portfolioLoad();
  return Object.values(all).sort((a,b)=>(b.savedAt||"").localeCompare(a.savedAt||""));
}

const RAG_META={
  none:{label:"No RAG Set",dot:"#d8cfc4",bg:"#f5f0e8",border:"#e0d8cc",text:"#a89e92"},
  green:{label:"Green",dot:"#5a9e70",bg:"#f0f7f2",border:"#a8d8b8",text:"#3a7050"},
  amber:{label:"Amber",dot:"#d4a020",bg:"#fdf8ec",border:"#e8d080",text:"#c48a1a"},
  red:{label:"Red",dot:"#cc5050",bg:"#fdf0f0",border:"#fca5a5",text:"#b84040"},
};

function PortfolioMiniRing({pct,size=44}){
  const r=16; const circ=2*Math.PI*r;
  const complete=pct>=100;
  const clr=complete?"#3a7050":pct>0?"#c96a3a":"#e0d8cc";
  const dash=circ*(Math.min(pct,100)/100);
  return(
    <svg width={size} height={size} viewBox="0 0 40 40">
      <circle cx="20" cy="20" r={r} fill={complete?"#3a7050":"none"} stroke="#e0d8cc" strokeWidth="4"/>
      {pct>0&&!complete&&(
        <circle cx="20" cy="20" r={r} fill="none" stroke={clr} strokeWidth="4"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          transform="rotate(-90 20 20)"/>
      )}
      {complete?(
        <text x="20" y="25" textAnchor="middle" fontSize="14" fill="#fdfbf7" fontWeight="900">✓</text>
      ):(
        <text x="20" y="25" textAnchor="middle" fontSize="11" fill={pct>0?"#c96a3a":"#b8a898"} fontWeight="900">{pct}%</text>
      )}
    </svg>
  );
}

function PortfolioDashboard({onOpen, onNew}){
  const [maps,setMaps]=useState(()=>portfolioList());
  const [confirmDelete,setConfirmDelete]=useState(null);
  const [lastBackup,setLastBackup]=useState(()=>localStorage.getItem("rmb_last_backup")||null);

  const refresh=()=>{
    setMaps(portfolioList());
    setLastBackup(localStorage.getItem("rmb_last_backup")||null);
  };

  const exportAllJSON=()=>{
    const snapshot={
      _type:"rmb_portfolio_backup",
      _v:1,
      exportedAt:new Date().toISOString(),
      maps: portfolioList()
    };
    const blob=new Blob([JSON.stringify(snapshot,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="ocm-portfolio-backup.json";
    a.click();
    URL.revokeObjectURL(url);
    const ts=new Date().toISOString();
    localStorage.setItem("rmb_last_backup", ts);
    setLastBackup(ts);
  };

  const importJSON=()=>{
    const input=document.createElement("input");
    input.type="file";
    input.accept=".json,application/json";
    input.onchange=async(e)=>{
      const file=e.target.files?.[0];
      if(!file) return;
      try{
        const text=await file.text();
        const parsed=JSON.parse(text);
        // Accept both portfolio backup format and single-map snap
        let mapsToImport=[];
        if(parsed._type==="rmb_portfolio_backup" && Array.isArray(parsed.maps)){
          mapsToImport=parsed.maps;
        } else if(parsed.id && parsed.project && parsed.tasks){
          mapsToImport=[parsed];
        } else {
          alert("Unrecognised file format. Please import a file exported from OCM Studio.");
          return;
        }
        let imported=0;
        mapsToImport.forEach(snap=>{
          if(snap.id && snap.project){
            portfolioUpsert({...snap, savedAt: snap.savedAt||new Date().toISOString()});
            imported++;
          }
        });
        if(imported>0){
          refresh();
          alert(`Imported ${imported} project${imported!==1?"s":""} successfully.`);
        } else {
          alert("No valid projects found in this file.");
        }
      }catch(err){
        alert("Could not read file: "+(err.message||"Unknown error"));
      }
    };
    input.click();
  };

  const exportPortfolioPDF=()=>{
    // Collect all data as a plain serialisable object and hand off
    // to a non-Babel window function that builds the HTML report.
    const ragMeta={
      none:{label:"No RAG",dot:"#d8cfc4",color:"#a89e92",bg:"#f5f0e8",border:"#e0d8cc"},
      green:{label:"Green",dot:"#5a9e70",color:"#3a7050",bg:"#f0f7f2",border:"#a8d8b8"},
      amber:{label:"Amber",dot:"#d4a020",color:"#c48a1a",bg:"#fdf8ec",border:"#e8d080"},
      red:{label:"Red",dot:"#cc5050",color:"#b84040",bg:"#fdf0f0",border:"#fca5a5"},

      const tc=TIER_CFG[m.tier||1];
      const rs=ragMeta[m.rag||"none"];

      const doneT=Object.values(m.tasks||{}).reduce((a,bp)=>a+Object.values(bp).reduce((b,arr)=>b+arr.filter(t=>t.status==="complete").length,0),0);
      const dels=m.deliverables||[];
      const delAvg=dels.length?Math.round(dels.reduce((a,d)=>a+(d.pct||0),0)/dels.length):0;
      const flags=[];
      Object.entries(m.tasks||{}).forEach(([lane,bp])=>Object.entries(bp).forEach(([phase,arr])=>arr.forEach(t=>{if(t.status==="red"||t.status==="blocked")flags.push({lane,phase,label:t.label,status:t.status});})));
      const days=m.goLiveDate?Math.ceil((new Date(m.goLiveDate)-new Date())/(86400000)):null;
      return {name:m.project?.name||"Untitled",tier:m.tier||1,tcLabel:tc.label,tcBg:tc.bg,tcBdr:tc.bdr,tcColor:tc.color,rsLabel:rs.label,rsDot:rs.dot,rsColor:rs.color,rsBg:rs.bg,rsBorder:rs.border,days,totalT,doneT,delAvg,flags};

    if(!dateStr) return null;
    const diff=Math.ceil((new Date(dateStr)-new Date())/(1000*60*60*24));
    return diff;
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#f5f0e8"}}>
      {/* Top bar */}
      <div className="appTopBar">
        <div style={{display:"flex",alignItems:"center",gap:14}}>

            <div style={{display:"flex",alignItems:"baseline",gap:0,userSelect:"none"}}>
              <span style={{fontFamily:"var(--serif)",fontSize:22,fontWeight:900,letterSpacing:"-.01em",
                color:"#c96a3a",marginRight:0}}>OCM</span>
              <span style={{fontFamily:"var(--serif)",fontSize:22,fontWeight:900,color:"#fdfbf7",letterSpacing:"-.01em",lineHeight:1}}>Studio</span>
            </div>

              {label:"Total Projects",val:totalMaps,color:"var(--navy)"},
              {label:"Green",val:ragCounts.green,color:"#3a7050"},
              {label:"Amber",val:ragCounts.amber,color:"#c48a1a"},
              {label:"Red",val:ragCounts.red,color:"#b84040"},
              {label:"No RAG Set",val:ragCounts.none,color:"#b8a898"},
            ].map(({label,val,color})=>(
              <div key={label} className="card" style={{padding:"14px 16px",textAlign:"center"}}>
                <div style={{fontSize:28,fontWeight:900,color,fontFamily:"var(--serif)"}}>{val}</div>
                <div style={{fontSize:11,fontFamily:"var(--mono)",fontWeight:900,letterSpacing:".08em",color:"var(--slate2)",marginTop:4}}>{label.toUpperCase()}</div>
              </div>
            ))}
          </div>
        )}

        {/* Header row */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:totalMaps>0?8:16}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:900,letterSpacing:".08em",color:"var(--slate2)"}}>
              {totalMaps>0 ? `${totalMaps} PROJECT${totalMaps!==1?"S":""}` : "NO PROJECTS YET"}
            </div>
            {totalMaps>0&&(
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                {[[1,"Tier 1 — High"],[2,"Tier 2 — Moderate"],[3,"Tier 3 — Low"]].map(([t,label])=>{
                  const tc=TIER_CFG[t];
                  const count=maps.filter(m=>(m.tier||1)===t).length;
                  if(count===0) return null;
                  return(
                    <span key={t} style={{display:"flex",alignItems:"center",gap:5,
                      fontFamily:"var(--mono)",fontSize:10,fontWeight:700,color:tc.color}}>
                      <span style={{width:8,height:8,borderRadius:2,background:tc.color,display:"inline-block",flexShrink:0}}/>
                      {label} ({count})
                    </span>
                  );
                })}
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:8}}>
            {totalMaps>0 && (
              <button className="btn btn-secondary" style={{padding:"10px 16px"}} onClick={exportPortfolioPDF}>
                📄 Export Portfolio Report
              </button>
            )}
            <button className="btn btn-primary" style={{padding:"10px 20px"}} onClick={onNew}>
              + New Project
            </button>
          </div>
        </div>

        {/* Backup status bar */}
        {totalMaps>0 && (()=>{
          const now=new Date();
          const getLabel=()=>{
            if(!lastBackup) return {text:"Never backed up",color:"#b84040",dot:"#b84040"};
            const diff=Math.floor((now-new Date(lastBackup))/60000);
            if(diff<2)   return {text:"Backed up just now",color:"#3a7050",dot:"#5a9e70"};
            if(diff<60)  return {text:`Backed up ${diff}m ago`,color:"#3a7050",dot:"#5a9e70"};
            const hrs=Math.floor(diff/60);
            if(hrs<24)   return {text:`Backed up ${hrs}h ago`,color:"#c48a1a",dot:"#d4a020"};
            const days=Math.floor(hrs/24);
            return {text:`Last backup ${days}d ago`,color:"#b84040",dot:"#cc5050"};
          };
          const {text,color,dot}=getLabel();
          return (
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"8px 12px",borderRadius:10,background:"#f5f0e8",
              border:"1px solid var(--border)",marginBottom:16,gap:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:dot,display:"inline-block",flexShrink:0}}></span>
                <span style={{fontSize:12,fontFamily:"var(--mono)",fontWeight:700,color}}>{text}</span>
                {lastBackup && (
                  <span style={{fontSize:11,color:"var(--slate2)",fontFamily:"var(--mono)"}}>
                    · {new Date(lastBackup).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
                  </span>
                )}
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button className="btn btn-secondary" style={{padding:"5px 12px",fontSize:11,fontFamily:"var(--mono)",fontWeight:700}}
                  onClick={()=>{ importJSON(); }}>
                  ↑ Import JSON
                </button>
                <button className="btn btn-secondary" style={{padding:"5px 12px",fontSize:11,fontFamily:"var(--mono)",fontWeight:700}}
                  onClick={()=>{ exportAllJSON(); }}>
                  ↓ Backup All (JSON)
                </button>
              </div>
            </div>
          );
        })()}

        {/* Empty state */}
        {totalMaps===0 && (
          <div className="card" style={{padding:"56px 32px",textAlign:"center",maxWidth:480,margin:"0 auto"}}>
            <div style={{marginBottom:20,display:"flex",justifyContent:"center"}}>
              <svg width="120" height="88" viewBox="0 0 120 88" fill="none" xmlns="http://www.w3.org/2000/svg">
                {/* Grid lines */}
                <rect x="8" y="8" width="104" height="72" rx="6" fill="#f5f0e8" stroke="#e0d8cc" strokeWidth="1.5"/>
                {/* Column dividers */}
                <line x1="34" y1="8" x2="34" y2="80" stroke="#e0d8cc" strokeWidth="1"/>
                <line x1="60" y1="8" x2="60" y2="80" stroke="#e0d8cc" strokeWidth="1"/>
                <line x1="86" y1="8" x2="86" y2="80" stroke="#e0d8cc" strokeWidth="1"/>
                {/* Row divider — header */}
                <line x1="8" y1="26" x2="112" y2="26" stroke="#e0d8cc" strokeWidth="1"/>
                {/* Header lane labels */}
                <rect x="12" y="13" width="18" height="7" rx="2" fill="#c96a3a" opacity=".7"/>
                <rect x="38" y="13" width="18" height="7" rx="2" fill="#5a8a70" opacity=".7"/>
                <rect x="64" y="13" width="18" height="7" rx="2" fill="#8a5a3a" opacity=".6"/>
                <rect x="90" y="13" width="18" height="7" rx="2" fill="#4a7a8a" opacity=".6"/>
                {/* Task cards — row 1 */}
                <rect x="12" y="31" width="18" height="10" rx="2" fill="#c96a3a" opacity=".25"/>
                <rect x="38" y="31" width="18" height="10" rx="2" fill="#5a8a70" opacity=".25"/>
                <rect x="64" y="31" width="18" height="10" rx="2" fill="#8a5a3a" opacity=".2"/>
                {/* Task cards — row 2 */}
                <rect x="12" y="46" width="18" height="10" rx="2" fill="#c96a3a" opacity=".18"/>
                <rect x="38" y="46" width="18" height="10" rx="2" fill="#5a8a70" opacity=".18"/>
                <rect x="64" y="46" width="18" height="10" rx="2" fill="#8a5a3a" opacity=".15"/>
                <rect x="90" y="46" width="18" height="10" rx="2" fill="#4a7a8a" opacity=".2"/>
                {/* Task cards — row 3 */}
                <rect x="38" y="61" width="18" height="10" rx="2" fill="#5a8a70" opacity=".15"/>
                <rect x="90" y="61" width="18" height="10" rx="2" fill="#4a7a8a" opacity=".15"/>
                {/* Subtle dot accent */}
                <circle cx="100" cy="20" r="3" fill="#c96a3a" opacity=".5"/>
              </svg>
            </div>
            <div style={{fontFamily:"var(--serif)",fontSize:22,fontWeight:800,marginBottom:8}}>No projects yet</div>
            <div style={{fontSize:14,color:"var(--slate)",lineHeight:1.7,marginBottom:24}}>
              Create your first project to start tracking OCM progress across your portfolio.
            </div>
            <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
              <button className="btn btn-primary" style={{padding:"12px 28px"}} onClick={onNew}>
                + New Project
              </button>
              <button className="btn btn-secondary" style={{padding:"12px 28px"}} onClick={()=>{ importJSON(); }}>
                ↑ Import from JSON
              </button>
            </div>
          </div>
        )}

        {/* Project cards grid */}
        {totalMaps>0 && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:16}}>
            {maps.map(m=>{
              const rc=RAG_META[m.rag||"none"];
              const tc=TIER_CFG[m.tier||1];
              const totalTasks=Object.values(m.tasks||{}).reduce((a,byPhase)=>a+Object.values(byPhase).reduce((b,arr)=>b+arr.length,0),0);
              const completeTasks=Object.values(m.tasks||{}).reduce((a,byPhase)=>a+Object.values(byPhase).reduce((b,arr)=>b+arr.filter(t=>t.status==="complete").length,0),0);
              const dels=m.deliverables||[];
              const delAvg=dels.length ? Math.round(dels.reduce((a,d)=>a+(d.pct||0),0)/dels.length) : 0;
              const days=daysUntil(m.goLiveDate);
              const savedDate=m.savedAt ? new Date(m.savedAt).toLocaleDateString("en-US",{month:"short",day:"numeric"}) : null;

              return(
                <div key={m.id} className="card" style={{padding:0,overflow:"hidden",cursor:"pointer",transition:"box-shadow .15s"}}
                  onClick={()=>onOpen(m)}
                  onMouseEnter={e=>e.currentTarget.style.boxShadow="var(--shadow-md)"}
                  onMouseLeave={e=>e.currentTarget.style.boxShadow="var(--shadow-sm)"}>

                  {/* Card top color bar */}
                  <div style={{height:5,background:tc?.color||"#a89e92"}}/>

                  <div style={{padding:"16px 18px"}}>
                    {/* Title row */}
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,marginBottom:12}}>
                      <div style={{minWidth:0}}>
                        <div style={{fontSize:16,fontWeight:800,lineHeight:1.3,color:"var(--navy)",marginBottom:4}}>
                          {m.project?.name||"Untitled Project"}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                          <span title={tc?.sub||""} style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:900,letterSpacing:".08em",
                            color:tc?.color,background:tc?.bg,border:`1px solid ${tc?.bdr}`,
                            padding:"2px 8px",borderRadius:999,cursor:"default"}}>
                            {tc?.label||"Tier ?"}
                          </span>
                          <span style={{fontSize:11,color:"var(--slate2)",fontFamily:"var(--mono)"}}>
                            {savedDate ? `Saved ${savedDate}` : ""}
                          </span>
                        </div>
                      </div>
                      {/* RAG pill */}
                      <div style={{
                        display:"flex",alignItems:"center",gap:5,flexShrink:0,
                        padding:"4px 10px",borderRadius:999,
                        background:rc.bg,border:`1.5px solid ${rc.border}`
                      }}>
                        <span style={{width:8,height:8,borderRadius:"50%",background:rc.dot,display:"inline-block"}}/>
                        <span style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:900,color:rc.text}}>{rc.label.toUpperCase()}</span>
                      </div>
                    </div>

                    {/* Metrics row */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
                      {/* Tasks */}
                      <div style={{textAlign:"center",padding:"8px 4px",background:"var(--off)",borderRadius:10}}>
                        <div style={{fontSize:18,fontWeight:900,color:"var(--navy)"}}>{completeTasks}<span style={{fontSize:12,color:"var(--slate2)"}}>/{totalTasks}</span></div>
                        <div style={{fontSize:10,fontFamily:"var(--mono)",fontWeight:900,letterSpacing:".06em",color:"var(--slate2)",marginTop:2}}>TASKS DONE</div>
                      </div>
                      {/* Deliverables ring */}
                      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"4px",background:"var(--off)",borderRadius:10}}>
                        <PortfolioMiniRing pct={delAvg}/>
                        <div style={{fontSize:10,fontFamily:"var(--mono)",fontWeight:900,letterSpacing:".06em",color:"var(--slate2)",marginTop:2}}>DELIVERABLES</div>
                      </div>
                      {/* Go-live */}
                      <div style={{textAlign:"center",padding:"8px 4px",background:"var(--off)",borderRadius:10}}>
                        <div style={{fontSize:18,fontWeight:900,color:days!==null&&days<=14?"#b84040":days!==null&&days<=30?"#c48a1a":"var(--navy)"}}>
                          {days===null?"—":days<0?"Past":days===0?"Today":days}
                        </div>
                        <div style={{fontSize:10,fontFamily:"var(--mono)",fontWeight:900,letterSpacing:".06em",color:"var(--slate2)",marginTop:2}}>
                          {days===null?"NO DATE":days<0?"GO-LIVE PAST":days===0?"GO-LIVE TODAY":"DAYS TO GO-LIVE"}
                        </div>
                      </div>
                    </div>

                    {/* Footer actions */}
                    <div style={{display:"flex",gap:8,borderTop:"1px solid var(--border)",paddingTop:12}}>
                      <button className="btn btn-primary" style={{flex:1,padding:"8px 0",fontSize:13,display:"flex",justifyContent:"center",alignItems:"center"}}
                        onClick={e=>{e.stopPropagation(); onOpen(m);}}>
                        Open Map →
                      </button>
                      <button className="btn btn-danger" style={{padding:"8px 12px",lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"}}
                        onClick={e=>{e.stopPropagation(); setConfirmDelete(m.id);}}
                        title="Delete project">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Delete confirm modal */}
      {confirmDelete && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
          <div className="card" style={{padding:"28px 32px",maxWidth:380,width:"100%",margin:"0 20px"}}>
            <div style={{fontFamily:"var(--serif)",fontSize:20,fontWeight:800,marginBottom:8}}>Delete this project?</div>
            <div style={{fontSize:14,color:"var(--slate)",lineHeight:1.6,marginBottom:20}}>
              This will permanently remove the map from the portfolio. This cannot be undone.
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button className="btn btn-secondary" onClick={()=>setConfirmDelete(null)}>Cancel</button>
              <button className="btn btn-danger" onClick={()=>handleDelete(confirmDelete)}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  // Check for shared snapshot in URL before anything else
  const sharedSnap = getSharedSnap();
  if(sharedSnap && sharedSnap.tasks && sharedSnap.lanes && sharedSnap.phases){
    return(
      <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"var(--off)"}}>
        <div className="appTopBar">
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div>
              <div style={{display:"flex",alignItems:"baseline",gap:0,userSelect:"none"}}>
              <span style={{fontFamily:"var(--serif)",fontSize:22,fontWeight:900,letterSpacing:"-.01em",
                color:"#c96a3a",marginRight:0}}>OCM</span>
              <span style={{fontFamily:"var(--serif)",fontSize:22,fontWeight:900,color:"#fdfbf7",letterSpacing:"-.01em",lineHeight:1}}>Studio</span>
            </div>
              <div className="subtle" style={{fontSize:12,marginTop:2}}>View-only shared snapshot</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10,fontSize:12,color:"#b8a898"}}>
            Shared by {sharedSnap.project?.owner||"OCM"} · {sharedSnap.savedAt ? new Date(sharedSnap.savedAt).toLocaleDateString() : ""}
          </div>
        </div>
        <div style={{flex:1,minHeight:0}}>
          <Stage4
            project={sharedSnap.project}
            tier={sharedSnap.tier}
            initLanes={sharedSnap.lanes}
            initPhases={sharedSnap.phases}
            initialTasks={sharedSnap.tasks}
            aiGenerated={false}
            initRag={sharedSnap.rag||"none"}
            initDeliverables={sharedSnap.deliverables||null}
            initGoLiveDate={sharedSnap.goLiveDate||""}
            initLaneColors={sharedSnap.laneColors||null}
            initLaneVisible={sharedSnap.laneVisible||null}
            initCollapsedLanes={sharedSnap.collapsedLanes||null}
            portfolioId={null}
            onExitToHome={()=>{window.location.href=window.location.origin+window.location.pathname;}}
            viewOnly={true}
          />
        </div>
      </div>
    );
  }

  // view: "portfolio" | "new" | "map"
  const [view,setView]=useState("portfolio");
  const [stage,setStage]=useState(0);
  const [project,setProject]=useState(null);
  const [scores,setScores]=useState(null);
  const [sTier,setSTier]=useState(null);
  const [s1Form,setS1Form]=useState(null);   // persists Stage1 form across back navigation
  const [s1Scores,setS1Scores]=useState(null); // persists Stage1 scores across back navigation
  const [mapCfg,setMapCfg]=useState(null);
  const [activeId,setActiveId]=useState(null); // portfolio project id being edited

  const [transitioning,setTransitioning]=useState(false);
  const [transitionMsg,setTransitionMsg]=useState("");

  const startTransitionToMap=(msg,nextCfg)=>{
    setTransitionMsg(msg);
    setTransitioning(true);
    setTimeout(()=>{
      setMapCfg(nextCfg);
      setView("map");
      setTransitioning(false);
    },420);
  };

  const goPortfolio=()=>{
    setView("portfolio");
    setStage(0);
    setProject(null);
    setScores(null);
    setSTier(null);
    setMapCfg(null);
    setActiveId(null);
  };

  const openFromPortfolio=(snap)=>{
    setProject(snap.project);
    setActiveId(snap.id);
    setMapCfg({
      tier:snap.tier, lanes:snap.lanes, phases:snap.phases,
      tasks:snap.tasks, aiGenerated:false,
      rag:snap.rag, deliverables:snap.deliverables,
      goLiveDate:snap.goLiveDate, laneColors:snap.laneColors,
      laneVisible:snap.laneVisible, collapsedLanes:snap.collapsedLanes,
      ciaEntries:snap.ciaEntries||[],
      stakeholderGroups:snap.stakeholderGroups||[],
      stakeholderRows:snap.stakeholderRows||[],
    });
    setView("map");
  };

  if(view==="portfolio"){
    return(
      <PortfolioDashboard
        onNew={()=>{ setView("new"); setStage(0); setS1Form(null); setS1Scores(null); }}
        onOpen={openFromPortfolio}
      />
    );
  }

  // When in map view, ProjectWorkspace renders its own full-screen layout with nav
  if(view==="map" && mapCfg){
    return(
      <div style={{height:"100vh",overflow:"hidden"}}>
        <ProjectWorkspace
          project={project}
          tier={mapCfg.tier}
          initLanes={mapCfg.lanes}
          initPhases={mapCfg.phases}
          initialTasks={mapCfg.tasks}
          aiGenerated={mapCfg.aiGenerated||false}
          initRag={mapCfg.rag||"none"}
          initDeliverables={mapCfg.deliverables||null}
          initGoLiveDate={mapCfg.goLiveDate||""}
          initLaneColors={mapCfg.laneColors||null}
          initLaneVisible={mapCfg.laneVisible||null}
          initCollapsedLanes={mapCfg.collapsedLanes||null}
          portfolioId={activeId}
          onExitToHome={goPortfolio}
          viewOnly={false}
          initCiaEntries={mapCfg.ciaEntries||[]}
          initStakeholderGroups={mapCfg.stakeholderGroups||[]}
          initStakeholderRows={mapCfg.stakeholderRows||[]}
        />
      </div>
    );
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"var(--off)"}}>
      <div className="appTopBar">
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div>
            <div style={{display:"flex",alignItems:"baseline",gap:0,userSelect:"none"}}>
              <span style={{fontFamily:"var(--serif)",fontSize:22,fontWeight:900,letterSpacing:"-.01em",
                color:"#c96a3a",marginRight:0}}>OCM</span>
              <span style={{fontFamily:"var(--serif)",fontSize:22,fontWeight:900,color:"#fdfbf7",letterSpacing:"-.01em",lineHeight:1}}>Studio</span>
            </div>
          </div>
          {view==="new" && (
            <div className="btn btn-dark-chip" style={{padding:"6px 10px",borderRadius:999,fontFamily:"var(--mono)",fontWeight:900,fontSize:12}}>
              Stage {stage+1} / 3
            </div>
          )}
          <button className="btn btn-dark-ghost" onClick={()=>{goPortfolio();}}>
            ← Portfolio
          </button>
        </div>

      </div>

      {view==="new" ? (
        <div style={{flex:1,overflowY:"auto",padding:"34px 0",background:"linear-gradient(160deg,#f5f0e8 0%,#ede7db 100%)"}}>
          <div style={{maxWidth:760,margin:"0 auto",padding:"0 22px"}}>
            <Steps current={stage} />
            {stage===0 && (
              <Stage1
                initForm={s1Form}
                initScores={s1Scores}
                onNext={(f,sc,tier)=>{
                  setS1Form(f);
                  setS1Scores(sc);
                  setProject(f);
                  setScores(sc);
                  setSTier(tier);
                  setStage(1);
                }}
              />
            )}
            {stage===1 && (
              <Stage2
                project={project}
                scores={scores}
                suggestedTier={sTier}
                onBack={()=>setStage(0)}
                onNext={(t,l,p,tk,ov,fromAI)=>{
                  const id=`map_${Date.now()}`;
                  const nextCfg={tier:t,lanes:l,phases:p,tasks:tk,override:ov,aiGenerated:fromAI,id};
                  setActiveId(id);
                  startTransitionToMap(fromAI?"Building your readiness map…":"Preparing your map canvas…",nextCfg);
                }}
              />
            )}
          </div>
        </div>
      ) : null}

      {transitioning && (
        <div className="overlay">
          <div className="overlayCard">
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{width:16,height:16,border:"2px solid rgba(201,106,58,.20)",borderTopColor:"#c96a3a",borderRadius:"50%",display:"inline-block",animation:"spin .7s linear infinite"}}></span>
              <div style={{fontSize:16,fontWeight:900}}>{transitionMsg||"Building your readiness map…"}</div>
            </div>
            <div style={{marginTop:8,fontSize:13,color:"var(--slate)",lineHeight:1.6}}>
              Applying lanes, phases, tasks, and dependencies…
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
