<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!--
  SECURITY: Content-Security-Policy restricts what scripts/styles can load.
  Adjust the hashes/nonces below if you add inline scripts, or move to a server header.
-->
<meta http-equiv="Content-Security-Policy"
  content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval'
      https://cdnjs.cloudflare.com
      https://fonts.googleapis.com
      https://unpkg.com
      https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
    font-src 'self' https://fonts.gstatic.com;
    connect-src 'self' https://api.anthropic.com https://cdnjs.cloudflare.com;
    img-src 'self' data: blob:;
    worker-src blob:;
    frame-src 'none';
    object-src 'none';
  " />
<title>OCM Studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin="anonymous"></script>

<!-- DOCX parsing (loaded synchronously — reliable) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.7.2/mammoth.browser.min.js" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    /* Warm parchment palette — Claude UI inspired */
    --navy:#1c1410;
    --navy2:#120d09;
    --slate:#7a6e62;
    --slate2:#a89e92;
    --border:#e0d8cc;
    --off:#f5f0e8;
    --off2:#ede7db;
    --white:#fdfbf7;
    --blue:#c96a3a;
    --blue2:#a8532a;
    --green:#4a7c59;
    --amber:#c48a1a;
    --orange:#b86430;
    --red:#b84040;

    --serif:'Lora', Georgia, serif;
    --sans:'Outfit', system-ui, sans-serif;
    --mono:'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

    --shadow-sm:0 1px 3px rgba(60,35,15,.07),0 1px 2px rgba(60,35,15,.05);
    --shadow-md:0 6px 18px rgba(60,35,15,.10),0 2px 8px rgba(60,35,15,.06);
    --shadow-lg:0 14px 40px rgba(60,35,15,.14),0 6px 18px rgba(60,35,15,.08);

    --radius:12px;
    --glow-blue:0 0 0 3px rgba(201,106,58,.18);
  }
  html, body, #root { height:100%; }
  body{
    font-family:var(--sans);
    font-size:15px;
    background:var(--off);
    color:var(--navy);
  }

  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#c8bdb0;border-radius:999px;}
  ::-webkit-scrollbar-thumb:hover{background:#a8998a;}

  @keyframes fadeUp { from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes scaleIn { from{opacity:0; transform:scale(.97)} to{opacity:1; transform:scale(1)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  .fade-up{ animation:fadeUp .35s cubic-bezier(.22,1,.36,1) both; }

  .card{
    background:var(--white);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:var(--shadow-sm);
  }

  /* Buttons */
  .btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:var(--sans);
    font-size:13px;
    font-weight:700;
    border:none;
    border-radius:999px;
    cursor:pointer;
    padding:8px 14px;
    transition:all .15s;
    line-height:1;
    letter-spacing:.01em;
    user-select:none;
  }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }
  .btn-primary{
    background:linear-gradient(135deg,#d97a48,#c96a3a);
    color:#fff;
    box-shadow:0 2px 10px rgba(201,106,58,.28);
  }
  .btn-primary:hover{ transform:translateY(-1px); box-shadow:0 8px 20px rgba(201,106,58,.32); }
  .btn-secondary{
    background:var(--white);
    color:#3a2e26;
    border:1px solid var(--border);
    box-shadow:var(--shadow-sm);
  }
  .btn-secondary:hover{ background:var(--off2); }
  .btn-ghost{
    background:transparent;
    color:#3a2e26;
    border:1px solid var(--border);
  }
  .btn-ghost:hover{ background:rgba(140,100,60,.07); }
  .btn-danger{
    background:var(--white);
    color:var(--red);
    border:1px solid #e8c0c0;
  }
  .btn-danger:hover{ background:#fdf0f0; }

  /* Dark top bar button variants */
  .btn-dark-ghost{
    background:transparent;
    color:#e8ddd0;
    border:1px solid rgba(232,221,208,.25);
  }
  .btn-dark-ghost:hover{ background:rgba(232,221,208,.10); }
  .btn-dark-chip{
    background:rgba(232,221,208,.12);
    color:#e8ddd0;
    border:1px solid rgba(232,221,208,.20);
  }
  .btn-dark-chip:hover{ background:rgba(232,221,208,.18); }

  /* Tiny icon buttons */
  .iconBtn{
    width:30px;
    height:30px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--white);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    transition:background .12s ease, transform .12s ease;
  }
  .iconBtn:hover{ background:var(--off2); transform:translateY(-1px); }
  .iconBtn.danger{ border-color:#e8c0c0; color:var(--red); }
  .iconBtn.danger:hover{ background:#fdf0f0; }
  .iconBtn.sml{ width:20px; height:20px; border-radius:6px; font-size:11px; }

  .miniPlus{
    width:28px;height:28px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--white);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-weight:900;
    font-size:16px;
    color:#5a4030;
    transition:background .12s ease, transform .12s ease;
  }
  .miniPlus:hover{ background:var(--off2); transform:translateY(-1px); }

  /* Inputs */
  .inp{
    width:100%;
    font-family:var(--sans);
    font-size:14px;
    border:1px solid #cfc6b8;
    border-radius:10px;
    padding:9px 12px;
    color:var(--navy);
    background:var(--white);
    transition:border-color .15s, box-shadow .15s;
    outline:none;
  }
  .inp:focus{ border-color:var(--blue); box-shadow:0 0 0 3px rgba(201,106,58,.15); }
  textarea.inp{ resize:vertical; min-height:88px; line-height:1.55; }

  .lbl{
    display:block;
    font-size:11px;
    font-weight:800;
    letter-spacing:.08em;
    color:var(--slate);
    text-transform:uppercase;
    margin-bottom:6px;
    font-family:var(--mono);
  }

  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:5px 10px;
    border-radius:999px;
    border:1px solid var(--border);
    background:var(--white);
    font-family:var(--mono);
    font-size:12px;
    font-weight:700;
    color:var(--slate);
    letter-spacing:.04em;
  }

  /* Dropdown menu */
  .menu{
    position:absolute;
    right:0;
    top:30px;
    min-width:220px;
    padding:8px;
    border-radius:12px;
    background:var(--white);
    border:1px solid var(--border);
    box-shadow:var(--shadow-lg);
    z-index:1000;
    animation:scaleIn .14s ease both;
  }
  .menu button{
    width:100%;
    text-align:left;
    background:transparent;
    border:none;
    border-radius:10px;
    padding:10px 10px;
    cursor:pointer;
    font-family:var(--sans);
    font-weight:700;
    color:#3a2e26;
  }
  .menu button:hover{ background:var(--off2); }
  .menu .danger{ color:var(--red); }

  /* Overlay */
  .overlay{
    position:fixed;
    inset:0;
    z-index:10000;
    background:rgba(28,20,10,.55);
    backdrop-filter: blur(4px);
    display:flex;
    align-items:center;
    justify-content:center;
    animation:fadeIn .15s ease both;
  }
  .overlayCard{
    background:var(--white);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px 18px;
    box-shadow:var(--shadow-lg);
    min-width:280px;
    max-width:520px;
  }

  /* Task card */
  .taskCard{
    position:relative;
    background:var(--white);
    border:1px solid var(--border);
    border-radius:14px;
    box-shadow:0 1px 4px rgba(60,35,15,.06);
    transition:transform .14s ease, box-shadow .14s ease, opacity .14s ease;
  }
  .taskCard:hover{ transform:translateY(-1px); box-shadow:0 4px 12px rgba(60,35,15,.10); }
  .taskControls{
    position:absolute;
    top:8px;
    right:8px;
    display:flex;
    gap:6px;
    opacity:0;
    pointer-events:none;
    transition:opacity .12s ease;
  }
  .taskCard:hover .taskControls{ opacity:1; pointer-events:auto; }

  /* Stage 4 layout */
  .gridWrap{
    flex:1;
    overflow:auto;
    padding:10px;
    position:relative;
    z-index:1;
  }
  .mapGrid{
    min-width:max-content;
    display:grid;
    column-gap:12px;
    row-gap:6px;
    align-items:stretch;
  }
  .phaseHeaderCell{ overflow:visible; position:relative; }
  .phaseCell{
    position:relative;
    min-width:260px;
    overflow:visible;
    z-index:0;
  }
  .phaseStripe{ background:var(--off2) !important; }

  /* Sticky Workstream column */
  .laneHeaderCell{
    position:sticky;
    left:0;
    z-index:50;
    background:var(--off);
    border-right:1px solid var(--border);
    padding-right:10px;
  }

  /* Sidebars / rails */
  .leftSidebar{
    flex-shrink:0;
    background:var(--off);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    transition:width .18s ease;
    position:relative;
    z-index:100;
  }
  .leftRail{
    width:44px;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:10px 6px;
    gap:10px;
  }
  .railBtn{
    width:32px;
    height:32px;
    border-radius:12px;
    border:1px solid var(--border);
    background:transparent;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    transition:background .12s ease;
  }
  .railBtn:hover{ background:var(--off2); }

  .drawerWrap{
    flex-shrink:0;
    border-left:1px solid var(--border);
    background:var(--off);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    transition:width .18s ease;
  }
  .drawerHeader{
    background:var(--off);
    padding:12px 12px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }
  .drawerBody{ padding:12px; overflow:auto; }
  .drawerRail{
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:10px 6px;
    gap:10px;
  }

  /* Top banner */
  .appTopBar{
    background:linear-gradient(180deg,#2c1f14 0%, #1e1409 100%);
    color:#f0e8dc;
    padding:0 18px;
    height:58px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid rgba(240,232,220,.08);
    box-shadow:0 1px 8px rgba(30,15,5,.25);
  }
  .appTopBar .subtle{ color:#b8a898; }

  /* Inline rename */
  .laneTitleInput{
    width:100%;
    border:1px solid #cfc6b8;
    border-radius:10px;
    padding:7px 10px;
    font-family:var(--sans);
    font-size:14px;
    font-weight:900;
    outline:none;
  }
  .laneTitleInput:focus{ border-color:var(--blue); box-shadow:var(--glow-blue); }

  /* Sidebar row controls */
  .laneRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 10px;
    border-left:4px solid transparent;
  }
  .laneRowRight{
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
  }
  .chk{
    width:16px;
    height:16px;
    accent-color: var(--blue);
    cursor:pointer;
  }

  /* ── View-Only Mode ──────────────────────────────────────────────────────── */
  /* Hide every editing affordance when .vo-mode is on the root Stage4 wrapper */

  /* Add task / add phase / add lane buttons */
  .vo-mode .miniPlus                    { display:none !important; }
  .vo-mode [title="Add task"]           { display:none !important; }
  .vo-mode [title="Add phase"]          { display:none !important; }

  /* Task card edit/delete controls */
  .vo-mode .taskControls                { display:none !important; }

  /* Lane rename edit button inside grid header */
  .vo-mode [title="Rename workstream"]  { display:none !important; }

  /* Lane collapse toggle — keep visible (read-only affordance), hide rename input */
  .vo-mode input[type="text"].laneEditInput { display:none !important; }

  /* Left sidebar: hide/show checkboxes, delete lane button, add lane row */
  .vo-mode .laneRow .laneRowRight input { display:none !important; }
  .vo-mode .laneRow .iconBtn.danger     { display:none !important; }
  .vo-mode .iconBtn.danger.sml          { display:none !important; }
  .vo-mode [class*="AddLane"]           { display:none !important; }

  /* Deliverables sidebar: hide pct input, link input, remove button, add button */
  .vo-mode .delRow input[type="number"] { display:none !important; }
  .vo-mode .delRow input[type="url"]    { display:none !important; }
  .vo-mode .delRow input[type="text"]   { display:none !important; }
  .vo-mode .delRow .iconBtn             { display:none !important; }
  .vo-mode .delAddRow                   { display:none !important; }

  /* Drawer: hide new-task form, delete task button, remove link/dep buttons */
  .vo-mode .btn-danger                  { display:none !important; }
  .vo-mode [title="Clear selection"]    { display:none !important; }

  /* Settings button + RAG selector (show RAG badge but not the dropdown) */
  .vo-mode [title="Set RAG"]            { pointer-events:none !important; }

  /* Phase rename button */
  .vo-mode [title="Rename phase"]       { display:none !important; }

  /* Cursor: task cards are read-only, don't show pointer on click targets */
  .vo-mode .taskCard                    { cursor:default !important; }

  /* The drawer can still show (for reading task detail), 
     but suppress all editing controls inside it */
  .vo-mode .drawer-edit-controls        { display:none !important; }

  /* Ghost add-task button — low profile, only visible on cell hover */
  .cellAddBtn{
    position:absolute;
    top:8px;
    right:8px;
    width:22px;
    height:22px;
    border-radius:6px;
    border:1px solid var(--border);
    background:var(--white);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:700;
    color:var(--slate2);
    opacity:0;
    transition:opacity .15s ease, background .12s ease;
    z-index:5;
    line-height:1;
  }
  /* Show on parent cell hover */
  .phaseCell:hover .cellAddBtn{ opacity:1; }
  .cellAddBtn:hover{ background:var(--off2); color:var(--slate); opacity:1; }

  /* Padding compensation: task card no longer needs right margin for hidden controls */
  .vo-mode .taskCard > div:first-child  { margin-right:0 !important; }

  /* ── Page navigation ── */
  .workspaceNav{
    display:flex; align-items:center; gap:0;
    background:var(--navy2); border-bottom:2px solid #2a1e16;
    padding:0 16px; height:58px; flex-shrink:0;
  }
  .workspaceNav .navBrand{
    display:flex; align-items:baseline; gap:0;
    margin-right:18px; white-space:nowrap; flex-shrink:0; user-select:none;
  }
  .workspaceNav .navBrand .brand-ocm{
    font-family:var(--serif); font-size:26px; font-weight:900; letter-spacing:-.01em;
    color:#c96a3a; line-height:1; margin-right:0;
  }
  .workspaceNav .navBrand .brand-studio{
    font-family:var(--serif); font-size:26px; font-weight:900; letter-spacing:-.01em;
    color:#fdfbf7; line-height:1;
  }
  .workspaceNav .navBrand .brand-divider{
    width:1px; height:16px; background:#c96a3a; opacity:.4;
    margin:0 12px; align-self:center; flex-shrink:0;
  }
  .workspaceNav .navBrand .brand-project{
    font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.04em;
    color:#b8a898; overflow:hidden; text-overflow:ellipsis; max-width:220px;
  }
  /* Module tabs — primary nav with subtle tinted chips */
  .navTab{
    display:flex; align-items:center; gap:7px;
    padding:0 14px; height:58px; border:none; cursor:pointer;
    background:transparent; color:#7a6e62;
    font-family:var(--mono); font-size:11px; font-weight:900;
    letter-spacing:.06em; border-bottom:3px solid transparent;
    transition:all .15s; white-space:nowrap; flex-shrink:0;
  }
  .navTab:hover{ color:#e8e0d4; background:rgba(255,255,255,.05); }
  /* Readiness Map — orange */
  .navTab.map{ color:#b8784a; }
  .navTab.map:hover{ color:#e8a878; background:rgba(201,106,58,.08); }
  .navTab.map.active{ color:#fdfbf7; border-bottom-color:#c96a3a; background:rgba(201,106,58,.14); }
  /* CIA — amber/red */
  .navTab.cia{ color:#9a7a50; }
  .navTab.cia:hover{ color:#d4a878; background:rgba(180,120,50,.08); }
  .navTab.cia.active{ color:#fdfbf7; border-bottom-color:#c48a1a; background:rgba(196,138,26,.14); }
  /* SA — green */
  .navTab.sa{ color:#4a7a5a; }
  .navTab.sa:hover{ color:#7ab890; background:rgba(74,158,106,.08); }
  .navTab.sa.active{ color:#fdfbf7; border-bottom-color:#4a9e6a; background:rgba(74,158,106,.14); }
  .navBadge{
    font-size:10px; font-weight:900; padding:1px 6px; border-radius:10px;
    background:rgba(255,255,255,.08); color:#9a8e82;
  }
  .navTab.map.active .navBadge{ background:rgba(201,106,58,.3); color:#f0c8a8; }
  .navTab.cia.active .navBadge{ background:rgba(196,138,26,.3); color:#f0d898; }
  .navTab.sa.active .navBadge{ background:rgba(74,158,106,.3); color:#a8d8b8; }
  .navSpacer{ flex:1; }
  .navDivider{ width:1px; height:28px; background:#2a1e16; margin:0 8px; flex-shrink:0; }

  /* ── Page views ── */
  .pageView{ flex:1; overflow:hidden; display:flex; flex-direction:column; background:var(--off); }
  .pageHeader{
    padding:22px 36px 18px; border-bottom:1px solid var(--border);
    background:var(--white); flex-shrink:0;
    display:flex; align-items:flex-start; justify-content:space-between; gap:20px;
  }
  .pageTitle{ font-family:var(--serif); font-size:26px; font-weight:700; color:var(--navy); line-height:1.1; }
  .pageSubtitle{ font-size:13px; color:var(--slate); margin-top:6px; line-height:1.6; max-width:600px; }
  .pageBody{ flex:1; overflow-y:auto; padding:28px 36px; display:flex; flex-direction:column; gap:16px; }

  /* ── SA detail panel ── */
  .detailSlide{
    width:min(480px,42vw); flex-shrink:0;
    background:var(--white); border-left:1px solid var(--border);
    box-shadow:-8px 0 28px rgba(28,20,16,.10);
    display:flex; flex-direction:column; overflow:hidden;
    animation: slideIn .2s ease;
  }
  @keyframes slideIn{ from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
  .detailSlideHeader{
    padding:16px 20px; border-bottom:1px solid var(--border);
    background:var(--off); flex-shrink:0;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .detailSlideBody{ flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
</style>
</head>

<body>
<div id="root"></div>

<script>
/* ── Security: HTML escape helper ────────────────────────────────────────── */
window._escHtml = function(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
};
var esc = window._escHtml;

window._buildPortfolioReport = function(data) {
  var rows = data.rows;
  var tsStr = data.generated;
  var dateStr = new Date(tsStr).toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  var total = rows.length;
  var ragCount = {green:0,amber:0,red:0,none:0};
  rows.forEach(function(r){ var k=r.rsLabel==="Green"?"green":r.rsLabel==="Amber"?"amber":r.rsLabel==="Red"?"red":"none"; ragCount[k]++; });

  function td(style,content){ return '<td style="'+style+'">'+content+'</td>'; }
  function th(style,txt){ return '<th style="text-align:left;font-size:10px;font-weight:900;letter-spacing:.07em;color:#a89e92;text-transform:uppercase;padding:6px 10px;background:#f5f0e8;border-bottom:1.5px solid #e0d8cc;'+style+'">'+txt+'</th>'; }

  var projectRows = rows.map(function(r){
    var days = r.days;
    var daysStr = days===null?"—":days<0?"Past":days===0?"Today":String(days);

/* ===== Anthropic Call ===== */
async function callClaude(userMsg){
  const res=await fetch("/api/claude",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-5",
      max_tokens:4000,
      system:"You are an expert OCM strategist. Return ONLY valid JSON — no markdown, no explanation, no backticks. Never truncate the JSON. Always close every array and object.",
      messages:[{role:"user",content:userMsg}]
    })
  });
  if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e?.error || `HTTP ${res.status}`); }
  const data=await res.json();
  const raw=(data.content||[]).map(c=>c.text||"").join("").trim();
  // Strip any markdown fences Claude may have added despite instructions
  const clean=raw
    .replace(/^```json\s*/i,"").replace(/^```\s*/,"").replace(/\s*```$/,"")
    .trim();
  // Attempt parse with progressive repair fallback
  try{
    return JSON.parse(clean);
  }catch(firstErr){
    // Try closing off truncated JSON by appending closing braces
    // Find the deepest unclosed structure and close it
    let attempt = clean;
    // Remove trailing incomplete string/value
    attempt = attempt.replace(/,\s*"[^"]*$/, "");       // trailing incomplete key
    attempt = attempt.replace(/:\s*"[^"]*$/, ':""}');   // trailing incomplete value
    attempt = attempt.replace(/,\s*$/, "");              // trailing comma
    // Count unclosed braces and brackets, close them
    let opens = 0, openArr = 0;
    for(const ch of attempt){ if(ch==="{") opens++; else if(ch==="}") opens--; else if(ch==="[") openArr++; else if(ch==="]") openArr--; }
    while(openArr > 0){ attempt += "]"; openArr--; }
    while(opens > 0){ attempt += "}"; opens--; }
    try{ return JSON.parse(attempt); }catch(_){}
    // Last resort: find last complete task object and close from there
    const lastComplete = clean.lastIndexOf('"blockedBy":[]}');
    if(lastComplete !== -1){
      let salvage = clean.slice(0, lastComplete + 15);
      let o=0, a=0;
      for(const ch of salvage){ if(ch==="{") o++; else if(ch==="}") o--; else if(ch==="[") a++; else if(ch==="]") a--; }
      while(a>0){ salvage+="]"; a--; }
      while(o>0){ salvage+="}"; o--; }
      try{ return JSON.parse(salvage); }catch(_){}
    }
    throw new Error("Could not parse the AI response. Try reducing the number of lanes or phases, then generate again.");
  }
}

/* ===== Share / View-Only URL ===== */
// Encodes a map snap into a URL-safe base64 string for the ?share= param.
// Uses built-in btoa after UTF-8 → binary conversion so no external deps needed.
function snapToShareParam(snap){
  try{
    const json = JSON.stringify(snap);
    // encode UTF-8 safely
    const bytes = new TextEncoder().encode(json);
    let binary = "";
    bytes.forEach(b => binary += String.fromCharCode(b));
    return btoa(binary).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
  }catch(e){ return null; }
}
function snapFromShareParam(param){
  try{
    const b64 = (param||"").replace(/-/g,"+").replace(/_/g,"/");
    const binary = atob(b64);
    const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
    const json = new TextDecoder().decode(bytes);
    return JSON.parse(json);
  }catch(e){ return null; }
}
// Returns the snap encoded in the current page URL, or null.
function getSharedSnap(){
  const p = new URLSearchParams(window.location.search).get("share");
  if(!p) return null;
  return snapFromShareParam(p);
}
// Builds a share URL for a given snap (uses current page origin + path).
// SECURITY NOTE: The full snapshot is embedded in the URL query string.
// URLs may leak via browser history, server logs, or Referer headers.
// For sensitive projects, prefer distributing the file directly rather than sharing URLs.
function buildShareUrl(snap){
  const param = snapToShareParam(snap);
  if(!param) return null;
  const base = window.location.origin + window.location.pathname;
  return base + "?share=" + param;
}

/* ===== PDF/DOCX Text Extraction ===== */

// pdf.js CDN candidates — tried in order until one loads
const PDFJS_CANDIDATES = [
  {
    lib: "https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js",
    worker: "https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js"
  },
  {
    lib: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js",
    worker: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"
  },
  {
    lib: "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js",
    worker: "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js"
  }
];

let _pdfjsReady = null; // cache the promise so we only load once

function loadPdfjsLib() {
  if (_pdfjsReady) return _pdfjsReady;

  _pdfjsReady = (async () => {
    // Already on window from a previous load
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_CANDIDATES[0].worker;
      return window.pdfjsLib;
    }

    for (const cdn of PDFJS_CANDIDATES) {
      try {
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = cdn.lib;
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
        if (!window.pdfjsLib) throw new Error("global not set after load");
        // Disable the worker entirely — avoids secondary fetch failures in
        // restricted / local-file environments
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = "";
        return window.pdfjsLib;
      } catch (_) {
        // try next candidate
      }
    }
    throw new Error("Could not load PDF support from any CDN. Check your internet connection and try again.");
  })();

  return _pdfjsReady;
}

async function extractPdfText(file) {
  const pdfjs = await loadPdfjsLib();
  const buf = await file.arrayBuffer();

  // disableWorker:true ensures extraction works even when a worker script
  // can't be fetched (local files, strict CSP, etc.)
  const loadTask = pdfjs.getDocument({ data: buf, disableWorker: true });
  const doc = await loadTask.promise;

  let out = "";
  for (let p = 1; p <= doc.numPages; p++) {
    const page = await doc.getPage(p);
    const content = await page.getTextContent();
    const strings = content.items.map(it => it.str || "").filter(Boolean);
    out += strings.join(" ") + "\n";
  }
  return out.trim();
}

async function extractTextFromFile(file) {
  // SECURITY: Enforce a 20 MB file size limit to prevent client-side DoS / browser freeze.
  const MAX_FILE_BYTES = 20 * 1024 * 1024; // 20 MB
  if (file.size > MAX_FILE_BYTES) {
    throw new Error(`File is too large (${(file.size / 1024 / 1024).toFixed(1)} MB). Please upload a file under 20 MB.`);
  }

  const ext  = (file.name.split(".").pop() || "").toLowerCase();
  const mime = (file.type || "").toLowerCase();

  if (ext === "pdf" || mime === "application/pdf") {
    return extractPdfText(file);
  }

  if (ext === "docx" || mime === "application/vnd.openxmlformats-officedocument.wordprocessingml.document") {
    const buf = await file.arrayBuffer();
    const res = await mammoth.extractRawText({ arrayBuffer: buf });
    return (res?.value || "").replace(/\s+\n/g, "\n").trim();
  }

  // Plain text / markdown / csv / json / rtf
  const text = await file.text();
  return String(text || "").trim();
}

INITIATIVE NAME: ${project.name}

${context}

  );

/* ===== Dependency helpers ===== */
function buildDependencyGraph(lanes, phases, tasks){
  const byId=new Map();
  const allIds=[];
  lanes.forEach(l=>phases.forEach(p=>{
    (tasks[l]?.[p]||[]).forEach((t,idx)=>{
      const id=getTaskId(l,p,idx);
      allIds.push(id);
      byId.set(id,{...t,id,lane:l,phase:p});
    });
  }));
  byId.forEach(n=>{
    n.blocks=Array.isArray(n.blocks)?n.blocks:[];
    n.blockedBy=Array.isArray(n.blockedBy)?n.blockedBy:[];
  });
  return {byId, allIds};
}
function walkUpstream(byId, startId){
  const visited=new Set();
  const stack=[startId];
  while(stack.length){
    const cur=stack.pop();
    if(visited.has(cur)) continue;
    visited.add(cur);
    const n=byId.get(cur);
    if(!n) continue;
    (n.blockedBy||[]).forEach(up=>{ if(!visited.has(up)) stack.push(up); });
  }
  visited.delete(startId);
  return visited;
}
function walkDownstream(byId, startId){
  const visited=new Set();
  const stack=[startId];
  while(stack.length){
    const cur=stack.pop();
    if(visited.has(cur)) continue;
    visited.add(cur);
    const n=byId.get(cur);
    if(!n) continue;
    (n.blocks||[]).forEach(dn=>{ if(!visited.has(dn)) stack.push(dn); });
  }
  visited.delete(startId);
  return visited;
}
function topoDepths(byId, idsSet){
  const ids=[...idsSet];
  const inSet=id=>idsSet.has(id);
  const indeg=new Map();
  ids.forEach(id=>indeg.set(id,0));
  ids.forEach(id=>{
    const n=byId.get(id);
    if(!n) return;
    (n.blocks||[]).forEach(d=>{
      if(inSet(d)) indeg.set(d,(indeg.get(d)||0)+1);
    });
  });
  const q=[];
  ids.forEach(id=>{ if((indeg.get(id)||0)===0) q.push(id); });
  const depth=new Map();
  q.forEach(id=>depth.set(id,0));
  while(q.length){
    const cur=q.shift();
    const curD=depth.get(cur)||0;
    const n=byId.get(cur);
    if(!n) continue;
    (n.blocks||[]).forEach(d=>{
      if(!inSet(d)) return;
      const nextD=curD+1;
      const prev=depth.get(d);
      if(prev===undefined || nextD>prev) depth.set(d,nextD);
      indeg.set(d,(indeg.get(d)||0)-1);
      if((indeg.get(d)||0)===0) q.push(d);
    });
  }
  ids.forEach(id=>{ if(!depth.has(id)) depth.set(id,0); });
  return depth;
}

/* ===== Circular Progress (module scope) ===== */
function CircularProgress({pct,size=36}){
  const r=14; const circ=2*Math.PI*r;
  const complete=pct>=100;
  const stroke=complete?"#3a7050":pct>0?"#c96a3a":"#e0d8cc";
  const fill=complete?"#3a7050":"none";
  const dash=circ*(Math.min(pct,100)/100);
  return(
    <svg width={size} height={size} viewBox="0 0 36 36" style={{flexShrink:0,cursor:"pointer"}}>
      <circle cx="18" cy="18" r={r} fill={fill} stroke="#e0d8cc" strokeWidth="3.5"/>
      {pct>0&&!complete&&(
        <circle cx="18" cy="18" r={r} fill="none" stroke={stroke} strokeWidth="3.5"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          transform="rotate(-90 18 18)"/>
      )}
      {complete?(
        <text x="18" y="22" textAnchor="middle" fontSize="13" fill="#fdfbf7" fontWeight="900">✓</text>
      ):pct>0?(
        <text x="18" y="22" textAnchor="middle" fontSize="9" fill="#c96a3a" fontWeight="900">{pct}%</text>
      ):(
        <text x="18" y="22" textAnchor="middle" fontSize="9" fill="#b8a898" fontWeight="700">0%</text>
      )}
    </svg>
  );
}

      const cur=t[p.lane]?.[p.phase]?.[p.idx];
      if(!cur) return;
      t[p.lane][p.phase][p.idx]={
        ...cur,
        ...patch,
        label: (patch.label ?? cur.label),
        owner: (patch.owner ?? cur.owner),

    });

    const p=parseTaskId(id);
    const removedId=id;

    mutate(t=>{
      // remove references to this id
      lanes.forEach(l=>phases.forEach(ph=>{
        (t[l]?.[ph]||[]).forEach(task=>{
          task.blocks=(task.blocks||[]).filter(x=>x!==removedId);
          task.blockedBy=(task.blockedBy||[]).filter(x=>x!==removedId);
        });
      }));

      // remove the task itself
      t[p.lane]?.[p.phase]?.splice(p.idx,1);

      // reindex references after splice
      lanes.forEach(l=>phases.forEach(ph=>{
        (t[l]?.[ph]||[]).forEach(task=>{
          task.blocks=(task.blocks||[]).map(x=>{
            const q=parseTaskId(x);
            if(q.lane===p.lane && q.phase===p.phase && q.idx>p.idx) return getTaskId(q.lane,q.phase,q.idx-1);
            return x;
          });
          task.blockedBy=(task.blockedBy||[]).map(x=>{
            const q=parseTaskId(x);
            if(q.lane===p.lane && q.phase===p.phase && q.idx>p.idx) return getTaskId(q.lane,q.phase,q.idx-1);
            return x;
          });

      }));
    });

      return;

    mutate(t=>{
      const f=parseTaskId(fromId);
      const from=t[f.lane]?.[f.phase]?.[f.idx];
      if(!from) return;

      from.blocks=from.blocks||[];
      if(from.blocks.includes(toId)) return;
      from.blocks.push(toId);

      const tp=parseTaskId(toId);
      const to=t[tp.lane]?.[tp.phase]?.[tp.idx];
      if(to){
        to.blockedBy=to.blockedBy||[];
        if(!to.blockedBy.includes(fromId)) to.blockedBy.push(fromId);
      }
    });
  };

      {helpOpen && (

            <div style={{fontFamily:"var(--serif)",fontSize:18,fontWeight:900,marginBottom:10}}>Help</div>

  return(

// Lightweight tooltip-style help icon — hover to reveal a popover
function HelpTip({content, width=260, position="below"}){
  const [open,setOpen]=React.useState(false);
  const ref=React.useRef(null);
  React.useEffect(()=>{
    if(!open) return;
    const handler=(e)=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[open]);
  const posStyle = position==="above"
    ? {bottom:"calc(100% + 8px)",top:"auto",left:"50%",transform:"translateX(-50%)"}
    : position==="left"
    ? {right:"calc(100% + 8px)",top:"50%",transform:"translateY(-50%)",left:"auto"}
    : {top:"calc(100% + 8px)",left:"50%",transform:"translateX(-50%)"};
  return(
    <div ref={ref} style={{position:"relative",display:"inline-flex",alignItems:"center",flexShrink:0}}>
      <button
        onClick={e=>{e.stopPropagation();setOpen(p=>!p);}}
        style={{
          width:16,height:16,borderRadius:"50%",
          border:"1.5px solid #c8bdb0",background:"var(--white)",
          cursor:"pointer",display:"inline-flex",alignItems:"center",justifyContent:"center",
          fontFamily:"var(--sans)",fontSize:10,fontWeight:900,color:"#a89e92",
          lineHeight:1,padding:0,flexShrink:0,
          transition:"border-color .12s,color .12s",
          ...(open?{borderColor:"#c96a3a",color:"#c96a3a"}:{})
        }}
        title="Help"
      >?</button>
      {open&&(
        <div style={{
          position:"absolute",zIndex:9999,...posStyle,
          width,background:"var(--navy)",color:"#f5f0e8",
          borderRadius:10,padding:"12px 14px",
          fontSize:12,lineHeight:1.65,fontFamily:"var(--sans)",
          boxShadow:"0 8px 24px rgba(28,20,16,.22)",
          pointerEvents:"auto",
        }}>
          {content}
          <div style={{
            position:"absolute",width:8,height:8,background:"var(--navy)",
            transform:"rotate(45deg)",
            ...(position==="below"?{top:-4,left:"50%",marginLeft:-4}:
               position==="above"?{bottom:-4,left:"50%",marginLeft:-4}:
               {right:-4,top:"50%",marginTop:-4})
          }}/>
        </div>
      )}
    </div>
  );
}

/* ===== AI Update Panel ===== */
function AiUpdatePanel({project, lanes, phases, tasks, onAcceptNew, onAcceptEdit, onClose}){
  const [step,setStep]=React.useState("docs");
  const [docs,setDocs]=React.useState([]);
  const [docsLoading,setDocsLoading]=React.useState(true);
  const [selectedDocs,setSelectedDocs]=React.useState([]);
  const [results,setResults]=React.useState(null);
  const [errMsg,setErrMsg]=React.useState("");
  const [handled,setHandled]=React.useState({}); // id -> "accepted"|"rejected"
  const [editing,setEditing]=React.useState({}); // id -> {label,detail} being edited

  React.useEffect(()=>{
    fetchDocsList().then(d=>{
      setDocs(d);
      setSelectedDocs(d.map(x=>x.name));
      setDocsLoading(false);
    });
  },[]);

  // Build a rich map summary including task IDs and details for the AI to reference
  const buildMapSummary=()=>{
    const lines=[];
    lanes.forEach(lane=>{
      phases.forEach(phase=>{
        const ts=(tasks[lane]?.[phase]||[]);
        ts.forEach((t,idx)=>{
          const id=`${lane}||${phase}||${idx}`;
          lines.push(`TASK_ID: ${id}`);
          lines.push(`  Lane: ${lane} | Phase: ${phase}`);
          lines.push(`  Label: ${t.label}`);
          lines.push(`  Status: ${t.status||"blue"}`);
          if(t.detail) lines.push(`  Detail: ${t.detail}`);
          if(t.owner) lines.push(`  Owner: ${t.owner}`);
          lines.push("");
        });
      });
    });
    return lines.join("\n")||"(no tasks yet)";
  };

  const runAnalysis=async()=>{
    setStep("running");
    setHandled({});
    setEditing({});
    try{
      let docContext="No documents provided — analyse map structure only.";
      if(selectedDocs.length>0){
        const contents=await fetchDocsContent(selectedDocs);
        docContext=contents.map(d=>`=== DOCUMENT: ${d.name} ===\n${d.content}`).join("\n\n");
      }

      const mapSummary=buildMapSummary();

      const prompt=`You are a senior Organizational Change Management (OCM) strategist conducting a careful review of an existing readiness map.

CRITICAL OPERATING PRINCIPLES:
1. The existing map represents deliberate, approved planning work. Treat every existing task as intentional and correct unless you have specific, document-backed evidence of a problem.
2. Your role is ADDITIVE — you identify what is missing or needs refinement, not what should be replaced.
3. NEVER suggest deleting or replacing existing tasks. Only suggest edits to improve clarity or accuracy.
4. Only suggest new tasks when the project documents clearly and specifically support their need — not based on general OCM best practice alone.
5. Be conservative — a short list of high-confidence, well-evidenced items is far more valuable than a long list of speculative ones.

PROJECT: ${project?.name||"this initiative"}

EXISTING MAP (DO NOT OVERWRITE — reference task IDs exactly as shown):
${mapSummary}

PROJECT DOCUMENTS:
${docContext.slice(0,14000)}

YOUR ANALYSIS TASKS:
1. ISSUES: Flag genuine problems with existing tasks — only where documents provide specific evidence. Types: "outdated" (document contradicts current task), "owner-gap" (document names a responsible party not reflected), "scope-gap" (document reveals this task is missing key scope), "duplicate" (two tasks clearly overlap).
2. EDITS: Suggest specific label or detail improvements to existing tasks — only where the documents provide better, more specific language. Reference the exact TASK_ID.
3. NEW TASKS: Suggest new tasks only where the documents explicitly describe work not represented anywhere in the existing map.

Return ONLY this JSON — no markdown, no explanation:
{
  "issues": [
    {
      "id": "i1",
      "type": "outdated|owner-gap|scope-gap|duplicate",
      "taskId": "exact TASK_ID from map, or null if general",
      "lane": "exact lane name",
      "phase": "exact phase name",
      "existingLabel": "exact label of the task this concerns, or null",
      "message": "1-2 sentences describing the specific issue and what document evidence supports it"
    }
  ],
  "edits": [
    {
      "id": "e1",
      "taskId": "exact TASK_ID from map — must match exactly",
      "lane": "exact lane name",
      "phase": "exact phase name",
      "existingLabel": "current task label, copied exactly",
      "suggestedLabel": "improved label, or null if label is fine",
      "suggestedDetail": "improved detail text, or null if detail is fine",
      "rationale": "1 sentence: what in the documents supports this specific edit"
    }
  ],
  "newTasks": [
    {
      "id": "n1",
      "lane": "exact lane name from map",
      "phase": "exact phase name from map",
      "label": "concise task label under 7 words",
      "status": "blue",
      "detail": "2-3 sentences: what this task involves and what completion looks like",
      "rationale": "1 sentence: specific document evidence that this task is needed",
      "owner": ""
    }
  ]
}

Rules:
- issues: maximum 5, only where document evidence is clear and specific
- edits: maximum 6, only genuine improvements — not cosmetic rewording
- newTasks: maximum 6, only where documents explicitly describe unrepresented work
- All lane and phase values must exactly match names in the existing map
- All taskId values must exactly match TASK_ID strings from the map summary above
- If documents are thin or the map is already comprehensive, return short or empty arrays — that is a valid and good result`;

      const raw=await callClaude(prompt);
      setResults(raw);
      setStep("results");
    }catch(e){
      setErrMsg(e.message||"Analysis failed");
      setStep("error");
    }
  };

  const markHandled=(id,how)=>setHandled(p=>({...p,[id]:how}));
  const startEdit=(id,current)=>setEditing(p=>({...p,[id]:{...current}}));
  const updateEditField=(id,field,val)=>setEditing(p=>({...p,[id]:{...p[id],[field]:val}}));
  const cancelEdit=(id)=>setEditing(p=>{const n={...p}; delete n[id]; return n;});

  const issues=(results?.issues||[]);
  const edits=(results?.edits||[]);
  const newTasks=(results?.newTasks||[]);
  const pendingCount=[...issues,...edits,...newTasks].filter(x=>!handled[x.id]).length;

  const typeColor={outdated:"#b84040","owner-gap":"#c48a1a","scope-gap":"#c96a3a",duplicate:"#7a6e62"};
  const typeBg={outdated:"#fdf0f0","owner-gap":"#fdf8ec","scope-gap":"#fdf3ec",duplicate:"#f5f0e8"};
  const typeLabel={outdated:"Outdated","owner-gap":"Owner Gap","scope-gap":"Scope Gap",duplicate:"Duplicate"};

  const SectionHeader=({label,count})=>(
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
      <div style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:900,letterSpacing:".08em",color:"var(--slate2)"}}>{label}</div>
      <div style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:900,color:"var(--slate2)",background:"var(--off2)",borderRadius:999,padding:"1px 7px"}}>{count}</div>
    </div>
  );

  return(
    <div className="overlay" onClick={onClose}>
      <div className="overlayCard" onClick={e=>e.stopPropagation()}
        style={{width:"min(720px,96vw)",maxHeight:"90vh",display:"flex",flexDirection:"column",padding:0,overflow:"hidden"}}>

        {/* Header */}
        <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:"var(--off)"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontFamily:"var(--serif)",fontSize:18,fontWeight:700,color:"var(--navy)"}}>✦ Update with AI</div>
              <HelpTip position="below" width={280} content={
                <span>
                  <strong style={{color:"#f5f0e8"}}>AI Map Review</strong><br/><br/>
                  Reads your uploaded project documents and compares them against your current map. Proposes new tasks and edits to existing ones.<br/><br/>
                  <strong>Nothing changes on your map until you explicitly accept each suggestion.</strong> You can also edit any suggestion before accepting.
                </span>
              }/>
            </div>
            <div style={{fontSize:12,color:"var(--slate2)",fontFamily:"var(--mono)",marginTop:2}}>
              {step==="docs"    && "Select documents · existing tasks will not change without your approval"}
              {step==="running" && "Reviewing your map — this takes 15–25 seconds…"}
              {step==="results" && (pendingCount>0 ? `${pendingCount} item${pendingCount!==1?"s":""} to review — nothing changes until you accept` : "All items reviewed")}
              {step==="error"   && "Analysis failed"}
            </div>
          </div>
          <button className="iconBtn" onClick={onClose}>✕</button>
        </div>

        {/* Body */}
        <div style={{flex:1,overflowY:"auto",padding:"18px 20px"}}>

          {/* ── Step: docs ── */}
          {step==="docs" && (
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div style={{fontSize:13,color:"var(--slate)",lineHeight:1.65,background:"var(--off2)",borderRadius:10,padding:"12px 14px"}}>
                <strong>How this works:</strong> The AI reads your selected documents and compares them against your current map. It will flag issues with existing tasks, suggest label or detail improvements, and propose new tasks — but <strong>nothing changes on your map until you explicitly accept each item</strong>. You can also edit any suggestion before accepting it.
              </div>

              {docsLoading ? (
                <div style={{color:"var(--slate2)",fontSize:13}}>Loading document list…</div>
              ) : docs.length===0 ? (
                <div style={{background:"var(--off2)",borderRadius:10,padding:"14px 16px",fontSize:13,color:"var(--slate)",lineHeight:1.6}}>
                  <strong>No documents found</strong> in the <code style={{background:"var(--off)",padding:"1px 5px",borderRadius:4}}>/docs</code> folder.<br/>
                  The AI will still review your map structure for internal consistency. Add <code>.txt</code>, <code>.md</code>, or <code>.csv</code> files to your GitHub <code>/docs</code> folder for richer analysis.
                </div>
              ) : (
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  <div style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:900,letterSpacing:".08em",color:"var(--slate2)",marginBottom:2}}>SELECT DOCUMENTS TO INCLUDE</div>
                  {docs.map(d=>(
                    <label key={d.name} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:"var(--off)",borderRadius:10,border:"1px solid var(--border)",cursor:"pointer"}}>
                      <input type="checkbox"
                        checked={selectedDocs.includes(d.name)}
                        onChange={e=>setSelectedDocs(prev=>e.target.checked?[...prev,d.name]:prev.filter(x=>x!==d.name))}
                        style={{accentColor:"#c96a3a",width:15,height:15,flexShrink:0}}/>
                      <span style={{fontFamily:"var(--mono)",fontSize:12,fontWeight:700,color:"var(--navy)",flex:1}}>{d.name}</span>
                      <span style={{fontSize:11,color:"var(--slate2)",fontFamily:"var(--mono)"}}>{!d.readable&&"⚠ large · "}{Math.round(d.size/1000)}kb</span>
                    </label>
                  ))}
                </div>
              )}

              <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
                <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
                <button className="btn btn-primary" onClick={runAnalysis}>
                  {docs.length===0 ? "Analyse Map Structure" : `Analyse with ${selectedDocs.length} doc${selectedDocs.length!==1?"s":""} →`}
                </button>
              </div>
            </div>
          )}

          {/* ── Step: running ── */}
          {step==="running" && (
            <div style={{textAlign:"center",padding:"40px 0"}}>
              <div style={{fontSize:32,marginBottom:14,animation:"spin 1.6s linear infinite",display:"inline-block",color:"#c96a3a"}}>✦</div>
              <div style={{fontFamily:"var(--serif)",fontSize:16,color:"var(--navy)",marginBottom:6}}>Reviewing your map…</div>
              <div style={{fontSize:12,color:"var(--slate2)",fontFamily:"var(--mono)"}}>Comparing {selectedDocs.length} document{selectedDocs.length!==1?"s":""} against {lanes.length} workstream{lanes.length!==1?"s":""}</div>
            </div>
          )}

          {/* ── Step: error ── */}
          {step==="error" && (
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{background:"#fdf0f0",border:"1px solid #f0c0c0",borderRadius:10,padding:"12px 14px",fontSize:13,color:"#b84040",lineHeight:1.5}}>
                <strong>Analysis failed:</strong> {errMsg}
              </div>
              <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                <button className="btn btn-secondary" onClick={()=>setStep("docs")}>← Back</button>
                <button className="btn btn-primary" onClick={runAnalysis}>Retry</button>
              </div>
            </div>
          )}

          {/* ── Step: results ── */}
          {step==="results" && results && (
            <div style={{display:"flex",flexDirection:"column",gap:24}}>

              {/* Notice bar */}
              <div style={{background:"#f0f7f2",border:"1px solid #a8d8b8",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#3a7050",fontFamily:"var(--mono)",fontWeight:700}}>
                ✓ Your map is unchanged. Review each item below and accept, edit, or dismiss individually.
              </div>

              {/* ── Issues ── */}
              {issues.length>0 && (
                <div>
                  <SectionHeader label="FLAGGED ISSUES" count={issues.filter(x=>!handled[x.id]).length} />
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {issues.map(issue=>{
                      if(handled[issue.id]) return null;
                      return(
                        <div key={issue.id} style={{background:typeBg[issue.type]||"var(--off)",border:"1px solid var(--border)",borderLeft:`3px solid ${typeColor[issue.type]||"#c96a3a"}`,borderRadius:10,padding:"11px 13px"}}>
                          <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                            <div style={{flex:1}}>
                              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                                <span style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:900,letterSpacing:".06em",color:typeColor[issue.type]||"#c96a3a",textTransform:"uppercase",background:typeBg[issue.type],borderRadius:4,padding:"2px 6px",border:`1px solid ${typeColor[issue.type]}44`}}>
                                  {typeLabel[issue.type]||issue.type}
                                </span>
                                {issue.lane && <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--slate2)"}}>{issue.lane} / {issue.phase}</span>}
                              </div>
                              {issue.existingLabel && (
                                <div style={{fontFamily:"var(--serif)",fontSize:12,color:"var(--slate)",marginBottom:4,fontStyle:"italic"}}>Re: "{issue.existingLabel}"</div>
                              )}
                              <div style={{fontSize:13,color:"var(--navy)",lineHeight:1.55}}>{issue.message}</div>
                            </div>
                            <button className="iconBtn sml" title="Dismiss" onClick={()=>markHandled(issue.id,"rejected")} style={{flexShrink:0}}>✕</button>
                          </div>
                          <div style={{marginTop:10,display:"flex",gap:6}}>
                            <button className="btn btn-secondary" style={{fontSize:12,padding:"5px 10px"}} onClick={()=>markHandled(issue.id,"rejected")}>Dismiss</button>
                            <span style={{fontSize:11,color:"var(--slate2)",alignSelf:"center",fontFamily:"var(--mono)"}}>Issues are informational — use the Edits section to apply changes</span>
                          </div>
                        </div>
                      );
                    })}
                    {issues.every(x=>handled[x.id]) && <div style={{fontSize:13,color:"var(--slate2)",fontStyle:"italic"}}>All issues reviewed.</div>}
                  </div>
                </div>
              )}

              {/* ── Edits ── */}
              {edits.length>0 && (
                <div>
                  <SectionHeader label="SUGGESTED EDITS TO EXISTING TASKS" count={edits.filter(x=>!handled[x.id]).length} />
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {edits.map(edit=>{
                      if(handled[edit.id]) return(
                        <div key={edit.id} style={{fontSize:12,color:"var(--slate2)",padding:"4px 2px",fontFamily:"var(--mono)"}}>
                          {handled[edit.id]==="accepted" ? "✓ Accepted" : "✕ Rejected"}: {edit.existingLabel}
                        </div>
                      );
                      const isEditing=!!editing[edit.id];
                      const cur=editing[edit.id]||{label:edit.suggestedLabel||edit.existingLabel, detail:edit.suggestedDetail||""};
                      return(
                        <div key={edit.id} style={{background:"var(--white)",border:"1px solid var(--border)",borderLeft:"3px solid #c48a1a",borderRadius:10,padding:"11px 13px"}}>
                          <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--slate2)",marginBottom:6}}>{edit.lane} / {edit.phase}</div>

                          {/* Before */}
                          <div style={{marginBottom:8}}>
                            <div style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:900,color:"var(--slate2)",letterSpacing:".06em",marginBottom:3}}>CURRENT</div>
                            <div style={{fontFamily:"var(--serif)",fontSize:13,color:"var(--slate)",lineHeight:1.4}}>{edit.existingLabel}</div>
                          </div>

                          {/* After */}
                          <div style={{marginBottom:8}}>
                            <div style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:900,color:"#c48a1a",letterSpacing:".06em",marginBottom:3}}>SUGGESTED</div>
                            {isEditing ? (
                              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                                {edit.suggestedLabel && (
                                  <input className="inp" style={{fontSize:13,padding:"6px 9px"}}
                                    value={cur.label}
                                    onChange={e=>updateEditField(edit.id,"label",e.target.value)}
                                    placeholder="Edit suggested label…"/>
                                )}
                                {edit.suggestedDetail && (
                                  <textarea className="inp" style={{fontSize:12,padding:"6px 9px",minHeight:70}}
                                    value={cur.detail}
                                    onChange={e=>updateEditField(edit.id,"detail",e.target.value)}
                                    placeholder="Edit suggested detail…"/>
                                )}
                              </div>
                            ) : (
                              <div>
                                {edit.suggestedLabel && <div style={{fontFamily:"var(--serif)",fontSize:13,color:"var(--navy)",lineHeight:1.4,marginBottom:3}}>{edit.suggestedLabel}</div>}
                                {edit.suggestedDetail && <div style={{fontSize:12,color:"var(--slate)",lineHeight:1.5}}>{edit.suggestedDetail}</div>}
                              </div>
                            )}
                          </div>

                          <div style={{fontSize:11,color:"#c48a1a",fontFamily:"var(--mono)",marginBottom:10,fontStyle:"italic"}}>↳ {edit.rationale}</div>

                          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                            {isEditing ? (
                              <>
                                <button className="btn btn-primary" style={{fontSize:12,padding:"5px 10px"}}
                                  onClick={()=>{
                                    const patch={};
                                    if(cur.label && cur.label!==edit.existingLabel) patch.label=cur.label;
                                    if(cur.detail) patch.detail=cur.detail;
                                    if(Object.keys(patch).length) onAcceptEdit(edit.taskId, patch);
                                    markHandled(edit.id,"accepted");
                                    cancelEdit(edit.id);
                                  }}>✓ Accept edited</button>
                                <button className="btn btn-secondary" style={{fontSize:12,padding:"5px 10px"}} onClick={()=>cancelEdit(edit.id)}>Cancel</button>
                              </>
                            ) : (
                              <>
                                <button className="btn btn-primary" style={{fontSize:12,padding:"5px 10px"}}
                                  onClick={()=>{
                                    const patch={};
                                    if(edit.suggestedLabel) patch.label=edit.suggestedLabel;
                                    if(edit.suggestedDetail) patch.detail=edit.suggestedDetail;
                                    onAcceptEdit(edit.taskId, patch);
                                    markHandled(edit.id,"accepted");
                                  }}>✓ Accept</button>
                                <button className="btn btn-secondary" style={{fontSize:12,padding:"5px 10px"}}
                                  onClick={()=>startEdit(edit.id,{label:edit.suggestedLabel||edit.existingLabel,detail:edit.suggestedDetail||""})}>
                                  ✎ Modify
                                </button>
                                <button className="btn btn-secondary" style={{fontSize:12,padding:"5px 10px"}} onClick={()=>markHandled(edit.id,"rejected")}>Reject</button>
                              </>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ── New tasks ── */}
              {newTasks.length>0 && (
                <div>
                  <SectionHeader label="SUGGESTED NEW TASKS" count={newTasks.filter(x=>!handled[x.id]).length} />
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {newTasks.map(sug=>{
                      if(handled[sug.id]) return(
                        <div key={sug.id} style={{fontSize:12,color:"var(--slate2)",padding:"4px 2px",fontFamily:"var(--mono)"}}>
                          {handled[sug.id]==="accepted" ? "✓ Added to map" : "✕ Rejected"}: {sug.label}
                        </div>
                      );
                      const isEditing=!!editing[sug.id];
                      const cur=editing[sug.id]||{label:sug.label,detail:sug.detail};
                      return(
                        <div key={sug.id} style={{background:"var(--white)",border:"1px solid var(--border)",borderLeft:"3px solid #4a7c59",borderRadius:10,padding:"11px 13px"}}>
                          <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--slate2)",marginBottom:6}}>{sug.lane} / {sug.phase}</div>
                          {isEditing ? (
                            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
                              <input className="inp" style={{fontSize:13,padding:"6px 9px"}}
                                value={cur.label}
                                onChange={e=>updateEditField(sug.id,"label",e.target.value)}
                                placeholder="Task label…"/>
                              <textarea className="inp" style={{fontSize:12,padding:"6px 9px",minHeight:70}}
                                value={cur.detail}
                                onChange={e=>updateEditField(sug.id,"detail",e.target.value)}
                                placeholder="Task detail…"/>
                            </div>
                          ) : (
                            <div style={{marginBottom:8}}>
                              <div style={{fontFamily:"var(--serif)",fontSize:13,fontWeight:500,color:"var(--navy)",lineHeight:1.4,marginBottom:4}}>{sug.label}</div>
                              <div style={{fontSize:12,color:"var(--slate)",lineHeight:1.5}}>{sug.detail}</div>
                            </div>
                          )}
                          <div style={{fontSize:11,color:"#4a7c59",fontFamily:"var(--mono)",marginBottom:10,fontStyle:"italic"}}>↳ {sug.rationale}</div>
                          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                            {isEditing ? (
                              <>
                                <button className="btn btn-primary" style={{fontSize:12,padding:"5px 10px"}}
                                  onClick={()=>{ onAcceptNew(sug.lane,sug.phase,{...sug,label:cur.label,detail:cur.detail,links:[],blocks:[],blockedBy:[]}); markHandled(sug.id,"accepted"); cancelEdit(sug.id); }}>
                                  ✓ Accept edited
                                </button>
                                <button className="btn btn-secondary" style={{fontSize:12,padding:"5px 10px"}} onClick={()=>cancelEdit(sug.id)}>Cancel</button>
                              </>
                            ) : (
                              <>
                                <button className="btn btn-primary" style={{fontSize:12,padding:"5px 10px"}}
                                  onClick={()=>{ onAcceptNew(sug.lane,sug.phase,{...sug,links:[],blocks:[],blockedBy:[]}); markHandled(sug.id,"accepted"); }}>
                                  ✓ Add to map
                                </button>
                                <button className="btn btn-secondary" style={{fontSize:12,padding:"5px 10px"}}
                                  onClick={()=>startEdit(sug.id,{label:sug.label,detail:sug.detail})}>
                                  ✎ Modify
                                </button>
                                <button className="btn btn-secondary" style={{fontSize:12,padding:"5px 10px"}} onClick={()=>markHandled(sug.id,"rejected")}>Reject</button>
                              </>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Empty state */}
              {issues.length===0 && edits.length===0 && newTasks.length===0 && (
                <div style={{textAlign:"center",padding:"28px 0"}}>
                  <div style={{fontSize:28,marginBottom:10}}>✓</div>
                  <div style={{fontFamily:"var(--serif)",fontSize:15,color:"var(--navy)",marginBottom:6}}>Your map looks comprehensive</div>
                  <div style={{fontSize:13,color:"var(--slate)"}}>No issues, edits, or new tasks were identified based on the current documents.</div>
                </div>
              )}

              <div style={{display:"flex",gap:8,justifyContent:"space-between",paddingTop:8,borderTop:"1px solid var(--border)"}}>
                <button className="btn btn-secondary" onClick={()=>{ setStep("docs"); setResults(null); setHandled({}); setEditing({}); }}>← Rerun Analysis</button>
                <button className="btn btn-primary" onClick={onClose}>Done</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const ADKAR_LEVELS=["Low","Medium","High"];

const LEVEL_BG={Low:"#fdf0f0",Medium:"#fdf8ec",High:"#f0f7f2"};
const MAG_COLOR={High:"#b84040",Medium:"#c48a1a",Low:"#4a9e6a"};
const JOURNEY={green:"Ready",amber:"Progressing",red:"Building",grey:"Not Started"};

/* ===== MultiSelectPill ===== */
function MultiSelectPill({options,selected=[],onChange,labelFn,placeholder="Select…"}){
  const [open,setOpen]=React.useState(false);
  const ref=React.useRef(null);
  React.useEffect(()=>{
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);
  const toggle=(opt)=>onChange(selected.includes(opt)?selected.filter(x=>x!==opt):[...selected,opt]);
  const lbl=(opt)=>labelFn?labelFn(opt):opt;
  return(
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={()=>setOpen(p=>!p)}
        style={{minHeight:34,padding:"4px 8px",borderRadius:8,border:"1px solid var(--border)",
          background:"var(--white)",cursor:"pointer",display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}>
        {selected.length===0
          ?<span style={{fontSize:12,color:"var(--slate2)"}}>{placeholder}</span>
          :selected.map(s=>(
            <span key={s} style={{fontSize:11,fontWeight:700,background:"var(--off2)",borderRadius:6,
              padding:"2px 7px",color:"var(--navy)",display:"flex",alignItems:"center",gap:4}}>
              {lbl(s)}
              <span style={{cursor:"pointer",opacity:.6}} onClick={e=>{e.stopPropagation();toggle(s);}}>✕</span>
            </span>
          ))
        }
        <span style={{marginLeft:"auto",fontSize:10,color:"var(--slate2)"}}>▾</span>
      </div>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"var(--white)",
          border:"1px solid var(--border)",borderRadius:10,boxShadow:"0 4px 16px rgba(0,0,0,.1)",
          zIndex:200,padding:6,display:"flex",flexDirection:"column",gap:2,maxHeight:200,overflowY:"auto"}}>
          {options.map(opt=>(
            <label key={opt} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",borderRadius:6,
              cursor:"pointer",background:selected.includes(opt)?"var(--off2)":"transparent"}}>
              <input type="checkbox" checked={selected.includes(opt)} onChange={()=>toggle(opt)}
                style={{accentColor:"#c96a3a",width:13,height:13}}/>
              <span style={{fontSize:12,color:"var(--navy)"}}>{lbl(opt)}</span>
            </label>
          ))}
        </div>
      )}
    </div>
  );
}

/* ===== ImplicationsAssistant ===== */
function ImplicationsAssistant({entry,stakeholderGroups,project,onAccept}){
  const {useState}=React;
  const [state,setState]=useState("idle");
  const [draft,setDraft]=useState("");

  const generate=async()=>{
    setState("loading");
    try{
      const groupNames=(entry.impactedGroups||[])
        .map(id=>stakeholderGroups.find(g=>g.id===id)?.name||id)
        .filter(Boolean);
      const prompt=`You are an expert OCM practitioner. Draft the "People-Side Implications" for this change impact.

PROJECT: ${project?.name||"Untitled"}
${project?.description?`CONTEXT: ${project.description.slice(0,1500)}`:""}

Change Title: ${entry.title||"—"}
Description: ${entry.description||"—"}
Current State: ${entry.currentState||"—"}
Future State: ${entry.futureState||"—"}
Impact Types: ${(entry.impactTypes||[]).join(", ")||"—"}
Magnitude: ${entry.magnitude||"—"}
Workstream: ${entry.workstream||"—"}
Impacted Groups: ${groupNames.join(", ")||"Not specified"}

Write 3–5 sentences covering: what behavior change is required, what resistance is likely and why, and what training or support people will need. Focus on the human side only — not technical implementation. Be specific, not generic.

Return only the plain text paragraph.`;

      const res=await fetch("/api/claude",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:512,
          system:"Expert OCM practitioner. Return only the requested text, no preamble or markdown.",
          messages:[{role:"user",content:prompt}]})
      });
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error||`HTTP ${res.status}`);}
      const data=await res.json();
      setDraft((data.content||[]).map(c=>c.text||"").join("").trim());
      setState("draft");
    }catch(e){
      setState("error");
    }
  };

  return(
    <React.Fragment>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        {state==="idle"&&(
          <button onClick={generate}
            style={{fontSize:11,padding:"3px 10px",borderRadius:7,border:"1.5px solid #f0c8a8",
              background:"#fdf3ec",color:"#c96a3a",cursor:"pointer",fontWeight:700,
              display:"inline-flex",alignItems:"center",gap:4}}>
            ✦ Draft implications
          </button>
        )}
        {state==="loading"&&(
          <span style={{fontSize:11,color:"#c96a3a",fontFamily:"var(--mono)",
            display:"inline-flex",alignItems:"center",gap:5}}>
            <span style={{width:10,height:10,border:"1.5px solid rgba(201,106,58,.3)",borderTopColor:"#c96a3a",
              borderRadius:"50%",display:"inline-block",animation:"spin .7s linear infinite"}}/>
            Drafting…
          </span>
        )}
        {state==="error"&&(
          <button onClick={()=>setState("idle")}
            style={{fontSize:11,color:"#b84040",background:"none",border:"none",cursor:"pointer",fontWeight:700}}>
            ✕ Failed — retry
          </button>
        )}
        {state==="draft"&&(
          <button onClick={()=>{setState("idle");setDraft("");}}
            style={{fontSize:11,padding:"3px 10px",borderRadius:7,border:"1.5px solid var(--border)",
              background:"transparent",color:"var(--slate)",cursor:"pointer",fontWeight:700}}>
            ↺ Regenerate
          </button>
        )}
      </div>
      {state==="draft"&&(
        <div style={{background:"#fdf8f2",border:"1.5px solid #f0c8a8",borderRadius:10,
          padding:"12px 14px",marginBottom:8}}>
          <div style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:900,color:"#c96a3a",
            letterSpacing:".06em",marginBottom:8}}>✦ AI DRAFT — edit if needed, then accept</div>
          <textarea value={draft} onChange={e=>setDraft(e.target.value)}
            style={{width:"100%",minHeight:88,fontSize:12,padding:"8px 10px",lineHeight:1.6,
              border:"1px solid #f0c8a8",borderRadius:8,resize:"vertical",
              fontFamily:"var(--sans)",color:"var(--navy)",background:"var(--white)",
              outline:"none",boxSizing:"border-box"}}/>
          <div style={{display:"flex",gap:8,marginTop:8,justifyContent:"flex-end"}}>
            <button className="btn btn-secondary" style={{fontSize:11,padding:"5px 10px"}}
              onClick={()=>{setState("idle");setDraft("");}}>Dismiss</button>
            <button className="btn btn-primary" style={{fontSize:11,padding:"5px 12px"}}
              onClick={()=>{onAccept(draft);setState("idle");setDraft("");}}>
              ✓ Accept
            </button>
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

/* ===== CIA Page ===== */
function CIAPage({entries,stakeholderGroups,lanes,phases,onAdd,onAddWithData,onUpdate,onRemove,onNavigateToSA,project}){
  const {useState}=React;

  const [filterWS,setFilterWS]=useState("");
  const [filterGrp,setFilterGrp]=useState("");

  const MB={High:"#fdf0f0",Medium:"#fdf8ec",Low:"#f0f7f2"};

  const impactedCount=[...new Set(entries.flatMap(e=>e.impactedGroups||[]))].length;

                {med>0&&<div style={{width:`${pct(med)}%`,background:"#d4a020",transition:"width .3s"}}/>}
                {low>0&&<div style={{width:`${pct(low)}%`,background:"#5a9e70",transition:"width .3s"}}/>}

              {/* Change Title */}

                        <strong>High</strong>: significant behavior, process, or role shifts — requires active intervention<br/><br/>
                        <strong>Medium</strong>: moderate adjustment — training and comms needed<br/><br/>
                        <strong>Low</strong>: minimal disruption — awareness is sufficient

                    }/>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    {MAGNITUDES.map(m=>(
                      <button key={m} onClick={()=>onUpdate(active.id,{magnitude:active.magnitude===m?"":m})}
                        style={{flex:1,padding:"8px 0",borderRadius:9,cursor:"pointer",
                          border:`1.5px solid ${active.magnitude===m?MC[m]:"var(--border)"}`,
                          background:active.magnitude===m?MB[m]:"transparent",
                          color:active.magnitude===m?MC[m]:"var(--slate2)",
                          fontFamily:"var(--mono)",fontSize:12,fontWeight:900}}>
                        {m==="Medium"?"Med":m}
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              {/* Impacted Groups */}
              <div>
                <label style={{fontSize:11,fontFamily:"var(--mono)",fontWeight:900,color:"var(--slate2)",letterSpacing:".06em",display:"block",marginBottom:6}}>IMPACTED GROUPS</label>
                {stakeholderGroups.length===0
                  ?<div style={{fontSize:12,color:"var(--slate2)",fontStyle:"italic",padding:"6px 0"}}>
                    No stakeholder groups defined yet.{" "}
                    <button onClick={onNavigateToSA}
                      style={{background:"none",border:"none",cursor:"pointer",color:"#c96a3a",fontWeight:700,fontSize:12,padding:0,textDecoration:"underline"}}>
                      Go to Stakeholder Assessment →
                    </button>
                  </div>
                  :<MultiSelectPill options={stakeholderGroups.map(g=>g.id)} selected={active.impactedGroups||[]}
                      onChange={v=>onUpdate(active.id,{impactedGroups:v})}
                      labelFn={(id)=>stakeholderGroups.find(g=>g.id===id)?.name||id}
                      placeholder="Select affected groups…"/>
                }
              </div>

              {/* People-side implications */}
              <div>
                <label style={{fontSize:11,fontFamily:"var(--mono)",fontWeight:900,color:"var(--slate2)",letterSpacing:".06em",display:"block",marginBottom:6}}>PEOPLE-SIDE IMPLICATIONS</label>
                {(active.description||active.currentState||active.futureState)&&(
                  <ImplicationsAssistant
                    entry={active}
                    stakeholderGroups={stakeholderGroups}
                    project={project}
                    onAccept={(text)=>onUpdate(active.id,{implications:text})}
                  />
                )}
                <textarea className="inp" style={{width:"100%",minHeight:80,fontSize:13,padding:"9px 12px",lineHeight:1.6,boxSizing:"border-box"}}
                  value={active.implications}
                  onChange={e=>onUpdate(active.id,{implications:e.target.value})}
                  placeholder="What behavior change is required? What resistance is likely? What training or support will people need?"/>
              </div>

              {/* Notes */}
              <div>
                <label style={{fontSize:11,fontFamily:"var(--mono)",fontWeight:900,color:"var(--slate2)",letterSpacing:".06em",display:"block",marginBottom:6}}>NOTES / ASSUMPTIONS</label>
                <textarea className="inp" style={{width:"100%",minHeight:56,fontSize:13,padding:"9px 12px",lineHeight:1.6,boxSizing:"border-box"}}
                  value={active.notes}
                  onChange={e=>onUpdate(active.id,{notes:e.target.value})}
                  placeholder="Open questions, caveats, assumptions…"/>
              </div>

              {/* Doc link */}
              <div>
                <label style={{fontSize:11,fontFamily:"var(--mono)",fontWeight:900,color:"var(--slate2)",letterSpacing:".06em",display:"block",marginBottom:6}}>DOCUMENT</label>
                <input className="inp" style={{width:"100%",fontSize:13,padding:"8px 12px",boxSizing:"border-box",marginBottom:6}}
                  value={active.docTitle||""}
                  onChange={e=>onUpdate(active.id,{docTitle:e.target.value})}
                  placeholder="Document title (e.g. Training Plan, Org Chart)…"/>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input className="inp" style={{flex:1,fontSize:13,padding:"8px 12px",boxSizing:"border-box"}}
                    value={active.docLink||""}
                    onChange={e=>onUpdate(active.id,{docLink:e.target.value})}
                    placeholder="Paste URL…"/>
                  {active.docLink&&(
                    <a href={active.docLink} target="_blank" rel="noopener noreferrer"
                      style={{fontSize:12,fontWeight:900,color:"#c96a3a",textDecoration:"none",
                        padding:"7px 12px",borderRadius:8,border:"1.5px solid #f0d0b8",
                        background:"#fdf3ec",whiteSpace:"nowrap",flexShrink:0}}>
                      {active.docTitle||"Open"} →
                    </a>
                  )}
                </div>
              </div>

              <div style={{paddingTop:8,borderTop:"1px solid var(--border)"}}>
                <button className="btn btn-ghost" style={{fontSize:12,color:"#b84040",borderColor:"#f0c0c0"}}
                  onClick={()=>{if(confirm("Remove this change?")){onRemove(active.id);setActiveId(null);}}}>
                  Remove this change
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
